<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{min-height:100%;background:#000;color:#fff;font-family:'Inter',sans-serif}
body::before{
  content:"";position:fixed;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(rgba(0,0,0,0.82),rgba(0,0,0,0.96)),
    url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&q=80&w=2070');
  background-size:cover;background-position:center;z-index:-1;
}
button{cursor:pointer;transition:all 0.18s;-webkit-tap-highlight-color:transparent;font-family:'Inter',sans-serif}
.container{max-width:520px;margin:0 auto;padding:40px 20px 60px}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp 0.55s cubic-bezier(0.16,1,0.3,1) both}
/* Ghost option buttons */
.opt-btn{
  display:block;width:100%;padding:18px 20px;margin-bottom:10px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.14);
  color:#fff;text-align:left;letter-spacing:2px;font-size:11px;font-weight:600;
  text-transform:uppercase;backdrop-filter:blur(4px);cursor:pointer;
}
.opt-btn:hover,.opt-btn.sel{background:#fff;color:#000;border-color:#fff}
/* Receipt */
.receipt{
  background:#fff;color:#000;padding:48px 36px 60px;
  font-family:'Courier Prime',monospace;position:relative;
  box-shadow:0 32px 80px rgba(0,0,0,0.9);
}
.receipt::after{
  content:"";position:absolute;bottom:-14px;left:0;width:100%;height:14px;
  background:
    linear-gradient(-45deg,transparent 7px,#fff 7px),
    linear-gradient( 45deg,transparent 7px,#fff 7px);
  background-size:14px 14px;background-position:left bottom,left bottom;
}
.r-head{text-align:center;border-bottom:1px dashed #000;padding-bottom:28px;margin-bottom:28px}
.r-section{margin-bottom:22px;padding-bottom:18px;border-bottom:1px dashed #ddd}
.r-section:last-of-type{border-bottom:none}
.r-label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;opacity:0.5;margin-bottom:10px}
.r-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;margin-bottom:5px}
.r-row.total{font-weight:700;font-size:14px;border-top:1px solid #000;padding-top:8px;margin-top:4px}
/* Share buttons */
.share-bar{display:flex;gap:8px;margin-top:22px;padding-top:22px;border-top:1px solid #ddd}
.s-btn{
  flex:1;padding:13px 4px;font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.5px;cursor:pointer;border:1px solid #000;background:transparent;
  color:#000;font-family:'Courier Prime',monospace;text-align:center;
}
.s-btn:hover{background:#000;color:#fff}
/* Progress bar */
.prog-bar{height:2px;background:rgba(255,255,255,0.12);margin-bottom:28px;position:relative}
.prog-fill{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,0.7);transition:width 0.35s ease}
/* Hot/iced tabs */
.tab-row{display:flex;margin-bottom:10px}
.tab-btn{flex:1;padding:10px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.5);cursor:pointer}
.tab-btn.active{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.6);color:#fff}
.tab-btn:first-child{border-right:none}
</style>

<script type="text/babel">
const {useState, useMemo} = React;

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const SITE_URL = "https://kimpanti.github.io/pourdecisions";
const CAREER_COUNT = 40;

// Price: base $5.50, +$0.50 per milk (non-none), +$0.50 per flavour (non-none)
function calcPrice(milk, flavour) {
  let p = 5.50;
  if (milk && milk !== "none") p += 0.50;
  if (flavour && flavour !== "none") p += 0.50;
  return `$${p.toFixed(2)}`;
}

function getTimestamp() {
  const d = new Date();
  return d.toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"}).toUpperCase()
    + " // " + d.toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"});
}

// ─── CAREERS (40) ─────────────────────────────────────────────────────────────
const CAREERS = {

"ciso":{career:"CISO",tagline:"No fuss. No additions. No apologies.",desc:"You have seen every threat, managed every crisis, and earned every grey hair deliberately. No milk, no sweetener, no explanation required. That is exactly how you lead. You speak in the language of risk — not technology — and the board leans in when you talk. Australia's $1.67 billion federal cyber investment and mandatory CIRMP obligations under the SOCI Act have made this role more visible, better resourced, and harder to fill than at any previous point.",demand:"Very high",demandNote:"The CISO talent pool in Australia is structurally undersupplied. The ACS Digital Pulse 2025 projects 54,000 additional cyber roles needed by 2030. At executive level, there are consistently more vacancies than qualified candidates. Median total compensation in Australia ranges from $250,000–$400,000, with government and defence roles in Canberra commanding a significant premium. Tenure is strong once you are in.",orgs:["ASX-listed corporates and financial services","Federal and state government agencies — ASD, Home Affairs, ATO","Healthcare networks and critical infrastructure operators","Large professional services firms","Defence contractors"],quals:["Undergraduate degree in IT, law, business, or engineering","CISSP or CISM — the industry benchmark at this level","10+ years progressive security experience across multiple domains","Executive leadership programme or MBA common at senior level"]},

"pen-tester":{career:"Penetration Tester",tagline:"Fast, intense, straight to the weakness.",desc:"You are not here for the ambience. You are here to find where it breaks before someone else does. Methodical in practice, adversarial by instinct — the barista hasn't handed back the change and you've already mapped three attack vectors. Australia's maturing security market is driving demand for specialised offensive practitioners who go well beyond checkbox compliance.",demand:"High",demandNote:"Penetration testing demand is strong and growing as Australian organisations move from compliance-driven to risk-driven security programmes. Cloud, mobile, and API penetration testing skills are the most undersupplied. Salaries typically range from $110,000–$160,000, with senior practitioners at Big 4 and specialist firms earning above $180,000. OSCP remains the non-negotiable credential at mid-senior level.",orgs:["Specialist cybersecurity consultancies — CyberCX, Tesserent, Sekuro","Big 4 and mid-tier consulting firms","Financial services — in-house red teams at major banks","Defence and intelligence agencies — ASD, DIO","Technology vendors with security divisions"],quals:["Degree in computer science or cybersecurity — strong self-study paths are valid","OSCP — the red team benchmark, non-negotiable at mid-senior level","CEH as a credible entry point","CTF competition history and bug bounty track record often valued more than formal qualifications at entry level"]},

"red-team":{career:"Red Team Lead",tagline:"Methodical, patient, willing to wait as long as it takes.",desc:"Red team work requires patience to plan multi-stage attack scenarios across weeks, discipline to document every step, and the honesty to report findings that make your colleagues uncomfortable. In Australia, this capability sits almost exclusively at the ASD/defence end and the largest financial services institutions — most organisations that think they want a red team aren't yet ready for one.",demand:"High",demandNote:"Red team talent is chronically undersupplied in Australia. Most organisations at the maturity level to run genuine red team exercises struggle to find qualified practitioners. The pathway through penetration testing is narrow. Senior Red Team Leads in Australia earn $160,000–$220,000, with defence and intelligence clearing significantly above that. Demand is stable but concentrated.",orgs:["ASD, ADF and defence contractors","Specialist offensive security consultancies","Financial services institutions with mature security programmes — the Big 4 banks","Government security agencies with Red Team capability"],quals:["Degree in computer science or cybersecurity","OSCP — non-negotiable at mid-senior level","GPEN — GIAC Penetration Tester","CTF competition history and documented research contributions highly regarded"]},

"vuln-researcher":{career:"Vulnerability Researcher",tagline:"You find what others declare impossible to find.",desc:"Vulnerability research sits at the edge of what is known — studying software and systems for flaws that have never been documented. You have a high tolerance for ambiguity and a very specific kind of satisfaction that comes only from finding something real that nobody else found. In Australia this capability is almost entirely concentrated in ASD and a handful of specialist firms.",demand:"High",demandNote:"Vulnerability research is one of the most globally scarce and domestically concentrated specialisms. In Australia, the primary employers are ASD and defence contractors with NV1/NV2 clearance requirements. Commercial roles exist at specialist firms like Pure Security and CyberCX. CVE publications and active bug bounty programmes are the most valued credentials. Salaries range from $130,000–$200,000+ depending on clearance level.",orgs:["Australian Signals Directorate (ASD)","Defence contractors — Leidos, BAE Systems, Thales Australia","Specialist security research firms","Technology vendors with dedicated security research teams"],quals:["Degree in computer science or software engineering","CVE publication history is the most important credential","Reverse engineering skills — IDA Pro, Ghidra, Binary Ninja","Active bug bounty participation — HackerOne, Bugcrowd"]},

"appsec-engineer":{career:"AppSec Engineer",tagline:"You review the code before anyone ships it. Usually.",desc:"Application Security Engineers embed security into the software development lifecycle — code review, SAST/DAST tooling, security testing frameworks, and developer training. You are the person dev teams both fear and genuinely appreciate. As Australian organisations accelerate software delivery, the gap between development pace and security assurance is widening rapidly.",demand:"Very high",demandNote:"AppSec is one of the most critically undersupplied disciplines in Australian cybersecurity. Seek and Indeed consistently show strong demand from fintech, SaaS, and government digital transformation programmes. Salaries typically range from $120,000–$170,000. Practitioners who can operate fluently in both engineering and security cultures command a significant premium over generalist security engineers.",orgs:["Fintech and SaaS companies — Afterpay, Canva, Atlassian","Financial services with large engineering teams — ANZ, CommBank, NAB","Government digital agencies — DTA, Services Australia","Big 4 consulting firms with development security practices"],quals:["Degree in computer science or software engineering","GWEB — GIAC Web Application Defender","Certified Application Security Engineer (CASE)","Hands-on SAST/DAST tooling — Checkmarx, Veracode, SonarQube"]},

"sec-engineer":{career:"Security Engineer",tagline:"The reliable backbone. Everything runs better because you exist.",desc:"Classic, precise, technically demanding to execute well. You build and maintain the controls that everyone else relies on — not flashy, not seeking recognition, and the first person called when something breaks at 2am during a Collingwood finals game. The ACS projects demand for this role growing at 14.2% through 2029, more than double the national average.",demand:"Very high",demandNote:"Security engineering consistently sits in the top five most-advertised cyber roles on Seek Australia, with cloud security engineering the most undersupplied variant. Salaries range from $110,000–$165,000, with cloud-focused engineers commanding the upper end. Demand is durable — it follows technology adoption curves and is not easily automated or outsourced.",orgs:["Technology companies and scale-ups","Financial services and fintech","Managed security service providers — Tesserent, CyberCX, Unison","Federal and state government digital transformation programmes"],quals:["Degree in computer science, software engineering, or information systems","AWS Security Specialty or equivalent cloud certification — Azure Security Engineer, GCP Professional Cloud Security","GIAC GSEC for foundational credentialling","Hands-on DevSecOps pipeline and infrastructure-as-code experience"]},

"cloud-arch":{career:"Cloud Security Architect",tagline:"Early adopter. Engineered under pressure. Ahead before anyone noticed.",desc:"You were designing zero-trust cloud architectures when most organisations were still debating whether to move to the cloud. Australia's whole-of-government cloud migration programme and the major banks' multi-cloud modernisation have created structural demand for this role that the market simply cannot fill.",demand:"Very high",demandNote:"Cloud security architecture is the single most critically undersupplied specialism in Australian cybersecurity. Hays Salary Guide 2024/25 places senior cloud security architects at $180,000–$250,000, with CCSP and AWS Security Specialty holders commanding above-market premiums. Government cloud programmes — particularly ASD-certified cloud — drive significant demand from Canberra.",orgs:["Hyperscaler partners — AWS, Microsoft, Google Australia","Financial services mid-cloud-migration — Big 4 banks, Macquarie","Government agencies in whole-of-government cloud programmes","Technology companies and scale-ups building cloud-native products"],quals:["Degree in computer science, software engineering, or information systems","AWS Security Specialty — the most recognised credential in this space","CCSP — Certified Cloud Security Professional","SABSA or TOGAF background increasingly expected for senior architecture roles"]},

"sec-architect":{career:"Security Architect",tagline:"You design systems that hold. The details are where you live.",desc:"Security Architects design the security posture of entire organisations — not individual tools, but the integrated frameworks, controls, and principles that hold when the attacker actually arrives. In Australia this role sits above the security engineer and below the CISO, often operating as the technical authority on major transformation programmes.",demand:"High",demandNote:"Security architecture is a well-compensated senior specialism with consistent demand across Australian enterprise, particularly as SOCI Act obligations and cloud migrations drive major infrastructure change programmes. Salaries range from $160,000–$220,000. Practitioners who can translate technical architecture into board-readable risk language are genuinely rare in the market.",orgs:["Large enterprises across financial services, healthcare, and government","Big 4 consulting firms — Deloitte, PwC, KPMG, EY","Defence agencies and system integrators","Technology companies building security-sensitive platforms"],quals:["Degree in computer science, engineering, or information systems","SABSA Chartered Security Architect — the most recognised architecture credential","CISSP with architecture concentration","10+ years progressive security experience, with enterprise architecture background preferred"]},

"devsecops":{career:"DevSecOps Engineer",tagline:"Security is not a gate. You build it into the pipeline from the start.",desc:"DevSecOps Engineers integrate security into the software development and deployment lifecycle rather than applying it at the end. You write the security tests that run in the CI/CD pipeline, build infrastructure-as-code that provisions securely by default, and make security feel like a feature rather than a friction point. Australian government digital transformation programmes are a major driver of demand.",demand:"Very high",demandNote:"DevSecOps is one of the most in-demand technical roles on Seek Australia, with demand particularly strong in government digital programmes and fintech. The DTA's Digital Government Strategy has created significant pipeline for practitioners who can operate fluently across security and engineering. Salaries range from $120,000–$170,000, with senior practitioners at scale-ups earning above $180,000.",orgs:["Technology companies and scale-ups — Canva, Atlassian, Xero","Financial services modernising their technology stack","Government digital agencies — DTA, ATO, Services Australia","Software vendors with security-sensitive products"],quals:["Degree in computer science or software engineering","AWS DevOps Engineer or equivalent cloud certification","GIAC GWEB — Web Application Defender","Hands-on CI/CD tooling — GitHub Actions, GitLab CI, Jenkins, Terraform"]},

"secops-manager":{career:"Security Operations Manager",tagline:"Always running. Never switched off. Patient by design.",desc:"Cold brew brews for 12 to 24 hours — always on, producing something more durable than anything rushed. Security Operations Managers are exactly that: the operational backbone that coordinates the SOC, owns the incident response programme, and keeps everything running while the rest of Melbourne sleeps. ACSC recorded over 87,400 reported cyber incidents in 2024 — demand for this role is structural.",demand:"High",demandNote:"Security operations management is a stable, well-compensated function across all large Australian organisations. Managed security service providers are the largest employer segment, driven by mid-market organisations outsourcing their SOC capability. Salaries range from $130,000–$180,000. AI-assisted tooling is changing the shape of the work — managers who understand both the operational and strategic dimensions are particularly sought after.",orgs:["Managed security service providers — CyberCX, Tesserent, Trustwave","Financial services institutions — Big 4 banks, regional banks, insurers","Telecommunications and utilities — Telstra, APA Group, Sydney Water","Large government departments — Home Affairs, ATO, Defence"],quals:["Degree in IT, cybersecurity, or business","CISM — the standard management credential at this level","3–5 years SOC analyst or incident response experience before management","GIAC GSOM or equivalent operations management certification"]},

"soc-analyst":{career:"SOC Analyst",tagline:"Underappreciated, always on, and quietly indispensable.",desc:"Batch brew is always there — reliable, consistent, ready before you ask. Nobody photographs it for Instagram. But remove it from the café and everything slows down. You are monitoring alerts at 3am while the rest of Melbourne sleeps, triaging incidents before they become crises. This is the role most Australian cyber professionals start from — and the one most employers can never fill fast enough.",demand:"High",demandNote:"SOC Analyst is one of the highest-volume vacancy categories on Seek Australia. The ACSC's 2024 report recorded 87,400+ cyber incidents in Australia — demand for people who can triage and respond is structural. Entry salaries range from $70,000–$90,000 with mid-level analysts at $90,000–$120,000. AI-assisted tooling is shifting the premium toward analysts who handle complex investigation over routine triage.",orgs:["Managed security service providers — the most common entry point","Financial services SOC teams — Big 4 banks and insurers","Government and defence — ASD, DHA, state police","Large enterprises with internal security operations — Telstra, Qantas, health networks"],quals:["Degree in IT, cybersecurity, or computer science — or a strong self-study equivalent","CompTIA Security+ as a foundational entry credential","GIAC GSEC for progression","Operational discipline and shift tolerance matter as much as credentials at entry level"]},

"ir-analyst":{career:"Incident Response Analyst",tagline:"You want the same outcome as everyone else. You have found your own path to it.",desc:"Incident Response Analysts step in when something goes wrong: calm under pressure, clear process, focused on containment and recovery. With 1,113 notifiable data breaches reported to the OAIC in 2024 — a 25% increase on 2023 and the highest total since mandatory reporting began — you are one of the most in-demand practitioners in the country.",demand:"Very high",demandNote:"Incident response is one of the most in-demand specialisms in Australian cybersecurity. The new 72-hour OAIC notification requirement under the Privacy Act 2024 reforms has intensified demand for practitioners who can move at regulatory speed. Salaries range from $110,000–$160,000 with senior retainer-based consultants earning significantly above that. Big 4 cyber practices and specialist IR firms are the main employers.",orgs:["Specialist IR consultancies — CrowdStrike, Mandiant (Google), CyberCX","Big 4 consulting firms with cyber incident response practices","Managed security service providers","Financial services institutions with in-house IR capability — major banks"],quals:["Degree in IT, cybersecurity, or computer science","GIAC GCIH — Certified Incident Handler","GCFE or GCFA for forensics capability","Tabletop exercise facilitation and crisis communication experience valued at senior levels"]},

"detection-eng":{career:"Detection & Response Engineer",tagline:"You do not just watch for threats. You build the systems that catch them.",desc:"Detection and Response Engineers build and tune the detection infrastructure — SIEM rules, EDR configurations, detection logic, and response playbooks — that the SOC operates from. Where the SOC Analyst responds to alerts, you design the systems that generate them. The shift from off-the-shelf detection to bespoke, high-fidelity detection logic is accelerating across Australian enterprise.",demand:"Very high",demandNote:"Detection engineering is one of the fastest-growing technical specialisms in Australian cybersecurity. Organisations that have experienced breaches — and there were over 1,100 notifiable ones in 2024 — invest heavily in this capability as a direct response. Salaries range from $120,000–$170,000. Splunk, Microsoft Sentinel, and Elastic are the dominant platforms in Australian enterprise.",orgs:["Financial services with mature security programmes — major banks, Macquarie","Managed security service providers with advanced practices","Technology companies and scale-ups","Defence and intelligence agencies"],quals:["Degree in computer science or cybersecurity","GIAC GSEC as a foundation","GIAC GCIA — Certified Intrusion Analyst","Hands-on SIEM engineering — Splunk, Microsoft Sentinel, or Elastic Stack typically required"]},

"grc-consultant":{career:"GRC Consultant",tagline:"Two worlds colliding perfectly. This intersection is your competitive advantage.",desc:"An iced dirty chai is an espresso shot pulled into chai over ice — two things that should not work together but absolutely do. Technical enough to understand the systems, legally-minded enough to govern them, commercially sharp enough to explain it to the CFO. SOCI Act, Privacy Act reforms, APRA CPS 234, and the Essential Eight have created a compliance environment where this skillset is structurally in demand.",demand:"Very high",demandNote:"GRC is the most consistently advertised cyber specialism on Seek Australia. The e2Cyber January 2026 market report identifies GRC specialists as one of the top three hiring priorities. SOCI Act CIRMP obligations, Privacy Act 2024 enforcement escalation, and APRA CPS 234 maturity expectations are the primary demand drivers. Salaries range from $110,000–$170,000 with Big 4 senior managers earning above $200,000.",orgs:["Big 4 consulting firms — Deloitte, PwC, KPMG, EY","Financial services — APRA-regulated entities including the Big 4 banks","ASX-listed corporates with in-house GRC functions","Healthcare, energy, and telecommunications under SOCI Act obligations"],quals:["Degree in law, business, IT, or accounting","CISA — Certified Information Systems Auditor","CRISC for risk specialisation","ISO 27001 Lead Auditor and Essential Eight Assessor certification increasingly expected"]},

"compliance-mgr":{career:"Compliance Manager",tagline:"You make sure the organisation does what it said it would do.",desc:"Compliance Managers build and maintain the internal frameworks that ensure ongoing adherence to regulatory obligations, industry standards, and internal policy. Where the GRC Consultant moves between engagements, you build something durable inside one organisation. You are the institutional memory, the audit trail, and often the first call the regulator makes.",demand:"High",demandNote:"Compliance management is a stable, growing function particularly in APRA-regulated entities, SOCI Act-covered critical infrastructure, and organisations subject to Privacy Act reform obligations. The volume of regulatory change in Australia since 2022 — SOCI, Privacy, Cyber Security Act 2024 — has expanded both the scope and seniority of these roles. Salaries range from $100,000–$160,000.",orgs:["Financial services — APRA-regulated banks, insurers, and superannuation funds","Healthcare and pharmaceutical companies","Critical infrastructure operators under SOCI Act","Large ASX-listed corporates with enterprise compliance functions"],quals:["Degree in law, business, IT, or accounting","CISA as a foundational audit and compliance credential","ISO 27001 Lead Implementer for standards-based environments","Sector-specific knowledge — APRA CPS 234, Privacy Act, SOCI Act CIRMP — often more valuable than generic credentials"]},

"it-auditor":{career:"IT Auditor",tagline:"The ratio matters. The framework matters. You are the one who checks.",desc:"A cappuccino is one-third espresso, one-third steamed milk, one-third foam — and if any of those thirds is wrong, you will know immediately. IT Auditors care about ratios, frameworks, and whether the documented control matches the actual control. In Australia's current regulatory environment — APRA CPS 234, Essential Eight, SOCI Act CIRMP — the foam is the audit trail, and it had better be right.",demand:"High",demandNote:"IT audit demand in Australia is strong and stable, driven by APRA prudential obligations, ASX corporate governance requirements, and the growing scope of technology in business. The role is increasingly specialised as cloud environments, AI systems, and SOCI Act obligations require auditors with genuine technical literacy. Salaries range from $100,000–$160,000, with Big 4 senior managers earning above $180,000.",orgs:["Big 4 and mid-tier accounting and consulting firms","Internal audit functions at ASX-listed companies","APRA-regulated financial services entities","Government agencies with audit and assurance mandates — ANAO, state equivalents"],quals:["Degree in IT, accounting, business, or law","CISA — the most recognised credential in this field in Australia","CRISC for risk-adjacent audit work","Chartered membership of IIA Australia — Institute of Internal Auditors"]},

"cyber-risk":{career:"Cyber Risk Analyst",tagline:"Do not underestimate the depth. Warmth is your professional superpower.",desc:"You translate genuinely complex technical risk into language that boards understand and act on. The best Cyber Risk Analysts in Melbourne hold a conversation in a Southbank boardroom and a Carlton dev team standup on the same afternoon and land perfectly in both rooms. The Australian Cyber Security Strategy 2030 and its $1.67 billion investment have elevated cyber risk to a board-level agenda item across all large organisations.",demand:"Very high",demandNote:"Cyber risk quantification and board-level risk communication are among the most undersupplied capabilities in Australian cybersecurity. The shift to risk-based frameworks — driven by APRA CPS 230, the Cyber Security Act 2024, and SOCI Act maturity requirements — is structural. Salaries range from $110,000–$165,000. Practitioners who combine CRISC with genuine business communication skills are consistently receiving multiple competing offers.",orgs:["Big 4 consulting firms","ASX-listed corporates — Group Risk and Technology Risk functions","APRA-regulated financial services entities","Insurance companies building cyber risk underwriting practices — Marsh, Aon, Willis Towers Watson"],quals:["Degree in business, finance, law, IT, or engineering","CRISC — Certified in Risk and Information Systems Control","CISA for audit-adjacent pathways","FAIR cyber risk quantification model experience increasingly valued"]},

"enterprise-risk":{career:"Enterprise Risk Manager",tagline:"You see the whole picture. Cyber is one chapter, not the whole story.",desc:"Enterprise Risk Managers sit above cyber risk and manage the full portfolio: operational, strategic, financial, reputational, and cyber risk in a unified framework. You understand that a ransomware attack is also a business continuity event, a reputational event, and a financial event — and you plan accordingly. APRA CPS 230 operational risk requirements have made this intersection of skills more commercially valuable than at any previous point.",demand:"High",demandNote:"Enterprise risk management with genuine cyber literacy is a growing and well-compensated niche in Australia. APRA CPS 230 — which came into effect in July 2025 — requires APRA-regulated entities to treat operational risk including cyber as an integrated discipline. Most ERM professionals lack technical depth; most cyber professionals lack enterprise risk breadth. Salaries range from $140,000–$200,000+.",orgs:["ASX-listed corporates — Group Risk and CRO functions","APRA-regulated financial services — banks, insurers, superannuation","Large government departments","Infrastructure and utilities companies under SOCI Act"],quals:["Degree in business, finance, law, or engineering","CRISC — Certified in Risk and Information Systems Control","CISM for cyber risk depth","Chartered membership of Risk Australia (previously RMIA) or equivalent professional body"]},

"3p-risk":{career:"Third Party Risk Manager",tagline:"You trust but verify. Mostly you just verify.",desc:"Third Party Risk Managers assess and manage the security and compliance risks that enter an organisation through its vendors, suppliers, and partners. You are the person who reads the supplier contract clauses that nobody else reads and asks the questions that nobody else asks. High-profile supply chain incidents — including the Crowdstrike outage impacting Australian organisations — have made this role a board-level priority.",demand:"Very high",demandNote:"Third party and supply chain risk management is one of the fastest-growing functions in Australian GRC. APRA CPS 230 and SOCI Act supply chain security obligations, combined with high-profile incidents in 2023–2025, have driven this from a niche specialism to a standard enterprise function. Salaries range from $110,000–$160,000. Procurement and contract management backgrounds provide a practical advantage.",orgs:["Financial services institutions with large vendor ecosystems — Big 4 banks","Healthcare and pharmaceutical companies","Telecommunications and critical infrastructure operators under SOCI Act","Government agencies with complex supply chains — DTA, ATO, Home Affairs"],quals:["Degree in IT, business, law, or accounting","CISA or CRISC for risk and audit credentialling","ISO 27001 Lead Auditor for vendor assessment work","Procurement or contract management background highly valued — practical skills over credentials"]},

"cyber-insurance":{career:"Cyber Insurance Analyst",tagline:"You price what others can't quantify.",desc:"Cyber Insurance Analysts sit at the intersection of actuarial science, risk management, and cybersecurity — quantifying cyber risk in financial terms for underwriting, broking, or claims. With 1,113 notifiable data breaches in Australia in 2024 and average breach costs exceeding $49,600 for small businesses, this is a market under significant pressure and in rapid growth.",demand:"Growing",demandNote:"Cyber insurance is one of the fastest-growing lines in the Australian insurance market. Marsh, Aon, and Willis Towers Watson are active hirers of practitioners who combine genuine cybersecurity literacy with insurance knowledge. The FAIR cyber risk quantification framework is increasingly expected. Salaries range from $100,000–$160,000, with senior underwriters and brokers earning well above that.",orgs:["Insurance companies with cyber underwriting portfolios — Chubb, Beazley, AIG Australia","Specialty risk brokers and advisors — Marsh, Aon, Willis Towers Watson","Reinsurance firms","Large consulting firms with actuarial and cyber practices — Deloitte, PwC"],quals:["Degree in actuarial science, finance, IT, or risk management","CRISC for cyber risk quantification methodology","CIP — Chartered Insurance Professional","FAIR model cyber risk quantification experience highly valued by underwriters"]},

"privacy-counsel":{career:"Privacy Counsel",tagline:"Warm, values-driven, thinks about people before systems.",desc:"You chose the chai because the experience mattered as much as the function — and you approach privacy exactly the same way. The individual at the centre, the system built around them. The Privacy and Other Legislation Amendment Act 2024 — which passed in December 2024 and introduced a statutory tort for serious privacy invasions — means Australian organisations are hiring privacy lawyers at a pace not seen before.",demand:"High",demandNote:"Privacy Counsel demand has accelerated significantly following the Privacy Act 2024 reforms. The 72-hour breach notification requirement, expanded OAIC enforcement powers, and the new statutory privacy tort have created urgent demand for lawyers with genuine technology literacy. Salaries range from $120,000–$180,000, with senior in-house counsel at ASX companies and large technology firms earning above $200,000. CIPP/A is fast becoming the market standard credential alongside the law degree.",orgs:["Law firms with technology and privacy practices — Allens, MinterEllison, Norton Rose Fulbright","In-house legal teams at large corporations","Financial services and healthcare organisations","Government agencies — OAIC, ATO, Services Australia, Home Affairs"],quals:["Law degree — LLB or JD — strongly preferred","CIPP/A — the most market-relevant credential for Australian privacy practice","CIPM for management-level in-house roles","Admission to the Australian bar — essential for legal advice giving functions"]},

"cpo":{career:"Chief Privacy Officer",tagline:"You have transcended the need for comfort. You are the governance layer above everything else.",desc:"The Chief Privacy Officer sets strategy, influences culture, advises the board, and makes decisions that shape how an entire organisation treats the people whose data it holds. Australia's new Privacy Commissioner Carly Kind has made 2025 a year of enforcement — which means the OAIC now knows your name, and your board wants to meet you.",demand:"High",demandNote:"CPO demand has been directly accelerated by the Privacy Act 2024 reforms. The OAIC's new three-Commissioner structure — splitting privacy, FOI, and information roles — signals sustained enforcement intent. Australian organisations that have never had a CPO are now actively hiring one. Salaries range from $200,000–$320,000. In-house CPO roles are most common at large technology companies, financial services, and healthcare.",orgs:["Large technology companies operating in Australia — Meta, Google, Microsoft Australia","Financial services institutions — banks, insurers, superannuation funds","Healthcare organisations handling sensitive clinical data","Federal government agencies — DHA, Services Australia, ATO"],quals:["Law degree — LLB or JD — the most common pathway","CIPP/A and CIPM as the credential combination for Australian practice","IAPP Fellowship at the most senior level","15+ years progressive privacy, legal, or governance experience typically expected"]},

"dpo":{career:"Data Protection Officer",tagline:"The corporate conscience. You sit between the organisation and the regulator.",desc:"Where the Privacy Counsel advises on the law, the DPO operationalises it inside the organisation: building the programme, managing the register, handling subject access requests, and being the face the regulator sees. With 1,113 notifiable breaches in 2024 and a newly empowered OAIC, you are the person whose phone rings at 11pm when the breach notification clock starts.",demand:"High",demandNote:"DPO roles are growing across Australian organisations. The Privacy Act 2024 reforms and the prospect of mandatory DPO appointments in a future tranche of reforms are driving proactive hiring. Organisations with European operations are already subject to GDPR DPO requirements. Salaries range from $130,000–$190,000. The CIPP/A + CIPP/E combination is the most valued credential set in the market.",orgs:["Large corporates with European market exposure — HSBC Australia, Nestle, Unilever","Financial services and healthcare — regulated sectors with high data volumes","Technology platforms handling significant personal data","Government agencies with large data holdings — ATO, Services Australia"],quals:["Degree in law, business, or IT","CIPP/A for Australian privacy — essential","CIPP/E if European operations are in scope — increasingly common","CIPM for programme management and operations"]},

"privacy-engineer":{career:"Privacy Engineer",tagline:"The same technical depth — with ethics built in from the start.",desc:"Privacy Engineers embed privacy into systems at the code and architecture layer: data minimisation by default, consent mechanisms that actually function, deletion pipelines that run automatically. You review the product brief before the first sprint starts. The Privacy Act 2024 requirement for 'technical and organisational measures' to protect personal data has made this role legally consequential, not just aspirational.",demand:"High",demandNote:"Privacy engineering is an emerging specialism in Australia, driven by Privacy Act 2024 requirements for technical privacy controls, the new statutory tort for serious privacy invasions, and regulatory pressure from the OAIC. The intersection of genuine software engineering skills with privacy law knowledge is rare. Salaries range from $120,000–$170,000. Technology companies and data-heavy financial services are the primary hirers.",orgs:["Technology companies — Atlassian, Canva, REA Group","Financial services and healthcare — data-heavy sectors","Government agencies modernising digital services — DTA, Services Australia","Consulting firms with privacy and technology practices"],quals:["Degree in computer science, software engineering, or information systems","CIPT — Certified Information Privacy Technologist","AWS Security Specialty or equivalent for technical credentialling","CIPP/A to complement the technical pathway with privacy law grounding"]},

"sec-analyst":{career:"Security Analyst",tagline:"Approachable, well-rounded, and more capable than people assume.",desc:"The latte is the most ordered coffee in Australia and there is a reason — it is reliably good, broadly appealing, and works across every context. Security Analysts are the same: the essential generalist role that underpins every security function, capable of moving across domains, and the foundation from which most specialist careers are built. Jobs & Skills Australia projects 14.2% employment growth in this group through 2029.",demand:"Very high",demandNote:"Security Analyst is consistently one of the highest-volume vacancy categories on Seek Australia, alongside SOC Analyst and Security Engineer. The ACS Digital Pulse 2025 projects 54,000 additional cyber roles needed by 2030. Entry salaries start at $70,000–$90,000, rising quickly to $100,000–$130,000 at mid-level. The pathway into specialist roles — threat intelligence, cloud security, incident response — is well-trodden.",orgs:["Every major sector — finance, healthcare, government, technology","Managed security service providers — the most common entry point","In-house security teams at mid-to-large enterprises","Government departments at all levels — APS cyber graduate programme"],quals:["Degree in IT, cybersecurity, or computer science — or a credible self-study pathway","CompTIA Security+ as a foundational entry credential","GIAC GSEC for progression","ASD Essential Eight Assessor certification increasingly valued in government and enterprise"]},

"ism":{career:"Information Security Manager",tagline:"Steady, considered, in it for the long run.",desc:"You looked at the whole menu and you chose tea. Not because you could not decide — because you thought about it properly and tea is what you actually wanted. Information Security Managers are the steady backbone of the profession — deeply reliable, broadly capable, with an institutional knowledge of risk that compounds over time. This is the most common senior security title in mid-sized Australian enterprises.",demand:"High",demandNote:"Information Security Manager is a stable, well-compensated role across Australian industry. It is the natural progression from senior technical roles into management and the most common title at director level in mid-sized enterprises. Salaries range from $130,000–$180,000. The role is evolving as organisations implement SOCI Act and Privacy Act obligations — practitioners who understand both frameworks are particularly sought after.",orgs:["Every major sector — the role exists wherever IT and risk intersect","Mid-sized enterprises across manufacturing, retail, and professional services","Financial services and healthcare at senior levels","Government departments across Commonwealth and state levels"],quals:["Degree in IT, business, or engineering","CISM — the most directly relevant credential in Australia for this role","ISO 27001 Lead Implementer for standards-based environments","ASD Essential Eight Assessor certification widely expected in government-adjacent roles"]},

"threat-intel":{career:"Threat Intelligence Analyst",tagline:"Patient, detail-obsessed, cares deeply about provenance.",desc:"You read the tasting notes. You also read the threat feeds, dark web forums, and MITRE ATT&CK at 11pm because you find it genuinely interesting. Threat intelligence is the same discipline applied to adversaries rather than Ethiopian naturals. The ACSC's 2024 report recorded 87,400+ cyber incidents — the analysts who understand who is behind them are the ones shaping Australia's defensive posture.",demand:"High",demandNote:"Threat intelligence is an emerging specialism in the Australian market. Most mid-sized organisations are only beginning to build this capability, creating first-mover advantages for early entrants. The ASD Threat Intelligence Sharing (TISN) framework and Joint Cyber Security Centres create strong government-adjacent demand. Salaries range from $100,000–$150,000, with geopolitical fluency — particularly across the Indo-Pacific — increasingly a differentiator.",orgs:["ASD and ACSC — the primary government employer for this specialism","AFP and ASIO — law enforcement and intelligence applications","Financial services institutions — Big 4 banks, SWIFT participants","Critical infrastructure operators with advanced security programmes"],quals:["Degree in IT, intelligence studies, criminology, or international relations","GCTI — GIAC Cyber Threat Intelligence","CompTIA CySA+ as an entry credential","Language skills — Mandarin, Indonesian, Russian — and geopolitical knowledge valued at senior levels"]},

"threat-hunter":{career:"Cyber Threat Hunter",tagline:"You do not wait for alerts. You go looking.",desc:"Cyber Threat Hunters proactively search through networks and systems for threats that have evaded automated detection, operating ahead of the alert queue rather than behind it. Independent by instinct, highly technical by necessity. In Australia, this role exists almost entirely at organisations with genuinely mature security programmes — the Big 4 banks, defence contractors, and the largest managed security service providers.",demand:"High",demandNote:"Threat hunting as a distinct function is growing rapidly in Australia as mature organisations move beyond reactive detection. Very few practitioners globally have the combination of technical depth and proactive mindset this role requires. Salaries range from $120,000–$175,000. The typical pathway is 3–5 years in a SOC or IR role before moving into threat hunting. CrowdStrike, CyberCX, and the major banks are the most active hirers.",orgs:["Managed security service providers with advanced practices — CyberCX, Tesserent","Financial services with mature security programmes — ANZ, CommBank, NAB, Macquarie","ASD and defence contractors","Large technology companies with internal security teams"],quals:["Degree in computer science or cybersecurity","GIAC GCIH — Certified Incident Handler as a foundation","GCFA — GIAC Certified Forensic Analyst","3–5 years SOC or incident response experience typically required"]},

"dfir":{career:"Digital Forensics Investigator",tagline:"You notice things others walk past. You reconstruct stories from fragments.",desc:"Digital forensics is finding evidence in places others have already declared clean. You are methodical, patient, and deeply uncomfortable with loose ends. You do your best work when everyone else has given up. You order the matcha at a Brunswick café and you already know what the barista did wrong. With a 25% increase in notifiable data breaches in 2024, the demand for post-incident forensic reconstruction has never been higher.",demand:"Moderate to high",demandNote:"Digital forensics maintains steady demand from litigation support, regulatory investigations, and law enforcement in Australia. AFP, state police forces, and specialist consultancies are the main employers. Cloud forensics is an emerging sub-specialism with very few qualified practitioners. Salaries range from $90,000–$150,000. Law enforcement and legal backgrounds provide a significant advantage for senior investigation roles.",orgs:["Australian Federal Police — digital forensics capability","State police forces — NSW Police, Victoria Police, QLD Police","Law firms requiring litigation support — Clayton Utz, King & Wood Mallesons","Government agencies and regulators — ASIC, AUSTRAC, ACCC","Specialist forensics consultancies — Kroll, Stroz Friedberg"],quals:["Degree in computer science, cybersecurity, criminology, or law","GCFE — GIAC Certified Forensic Examiner","EnCE — EnCase Certified Examiner — the standard for law enforcement pathways","Law enforcement or legal background provides a significant advantage for senior roles"]},

"cyber-policy":{career:"Cyber Policy Analyst",tagline:"Operating at the intersection of technology and society.",desc:"You are not building systems or breaking them — you are shaping the rules that govern them. You understand technology well enough to know when a policy proposal is technically illiterate, and politics well enough to know when a technically perfect proposal will never survive the process. Australia's $1.67 billion Cyber Security Strategy 2030 and expanding regulatory landscape are creating a genuine profession from what was previously a series of individual roles.",demand:"Growing",demandNote:"Cyber policy is a growing function in both government and industry in Australia. The Cyber Security Act 2024, SOCI Act amendments, Privacy Act reforms, and the AI Safety Institute' work are generating sustained demand for practitioners who can bridge technical and regulatory worlds. Canberra is the primary location for government roles. Salaries range from $90,000–$150,000 in the APS, higher in the private sector.",orgs:["ASD and ACSC — Cyber Security Strategy implementation roles","Department of Home Affairs — Cyber and Critical Technology policy","State government cybersecurity agencies","Industry peak bodies — AISA, AICD, Financial Services Council"],quals:["Degree in law, public policy, political science, or international relations","CIPP/G — Certified Information Privacy Professional / Government","Graduate research background — Honours, Masters, or PhD — common in this field","ASD Essential Eight knowledge increasingly expected even in policy roles"]},

"sec-policy-writer":{career:"Security Policy Writer",tagline:"You give complex ideas their clearest, most useful form.",desc:"Security Policy Writers produce the policies, standards, procedures, and guidelines that govern how an organisation manages its security. Precise, thorough, independent in their judgement. The SOCI Act's CIRMP requirements and the Privacy Act's expanded compliance obligations have created significant demand for practitioners who can translate regulatory requirements into workable internal frameworks.",demand:"Growing",demandNote:"Security policy and technical writing is a growing specialism as Australian organisations formalise their security programmes ahead of SOCI Act annual reporting and Privacy Act compliance deadlines. The role is often contracted or freelance, with daily rates of $700–$1,100 common for experienced practitioners. In-house roles range from $95,000–$145,000. A strong portfolio is the primary credential — everything else supports it.",orgs:["Specialist GRC consultancies — Protiviti, Gallagher Bassett, Deloitte Risk Advisory","Government agencies building security frameworks — ASD, Home Affairs, ATO","Large enterprises formalising programmes ahead of SOCI Act compliance","Independent contractors across most major sectors"],quals:["Degree in communications, IT, law, or English","CISM or CISA for governance context and credibility","ISO 27001 Lead Implementer for ISMS framework knowledge","A strong technical writing portfolio is the most important credential in this market"]},

"ot-specialist":{career:"OT/ICS Security Specialist",tagline:"You protect systems that, if they fail, the lights go out.",desc:"Operational Technology and Industrial Control System security specialists protect the systems that run power grids, water treatment plants, manufacturing lines, and critical infrastructure. The SOCI Act's Critical Infrastructure Risk Management Programme (CIRMP) obligations, which expanded to cover all 11 critical infrastructure sectors by April 2025, have made this one of the most urgently needed specialisms in Australia.",demand:"Rapidly growing",demandNote:"OT/ICS security is one of the most critically undersupplied specialisms in Australia. The SOCI Act CIRMP obligations now cover energy, water, transport, telecommunications, healthcare, and 6 other sectors — all requiring OT security capability. The intersection of IT security skills with OT/industrial knowledge is vanishingly rare. Salaries range from $130,000–$200,000. Engineering backgrounds in the relevant industrial sector provide a significant practical advantage.",orgs:["Energy and utilities companies — AGL, Origin, Sydney Water, Ausgrid","Water and wastewater operators — SA Water, City West Water","Manufacturing and resources companies","Government agencies — CISC (Critical Infrastructure Security Centre), Home Affairs"],quals:["Degree in engineering, IT, or industrial systems","GICSP — Global Industrial Cyber Security Professional — the field standard","IEC 62443 certification increasingly expected for senior roles","Engineering background in energy, water, or manufacturing provides a significant advantage"]},

"ai-gov":{career:"AI Governance Professional",tagline:"Niche, emerging — and about to be everywhere.",desc:"The Magic is Melbourne's own — a double ristretto over three-quarters of a cup of steamed milk. Most people outside Victoria have never heard of it. In 2026, AI governance is exactly that: a discipline being built from scratch, that most organisations do not yet have, and that is about to become one of the most in-demand roles in the country. Australia's AI Safety Institute opened in 2024, and the Privacy Act's automated decision-making transparency requirements take effect in 2026.",demand:"Rapidly growing",demandNote:"AI governance is the fastest-growing specialism in the GRC space in Australia. Australia's AI Safety Institute, the Privacy Act 2024 automated decision-making obligations (effective December 2026), ISO 42001 adoption, and the EU AI Act's extraterritorial reach for Australian organisations are the primary demand drivers. Salaries range from $120,000–$180,000 with senior practitioners earning significantly above that. First-mover advantage in this field is significant.",orgs:["Technology companies deploying AI — Atlassian, Canva, ResMed, Cochlear","Financial services regulators and APRA-regulated entities","Government departments and agencies — DSIT, Home Affairs, ATO","Professional services firms building AI governance practices"],quals:["Degree in law, philosophy, computer science, or public policy","ISO 42001 AI Management Systems — the most relevant emerging certification","CIPP/A or CIPP/E for the privacy-adjacent pathway","Masters in AI ethics, technology law, or digital governance increasingly common for senior roles"]},

"ai-safety":{career:"AI Safety Researcher",tagline:"You are not asking how to make it faster. You are asking whether it should exist.",desc:"AI Safety Researchers operate at the technical and philosophical frontier: studying how large language models fail, how alignment between human values and AI behaviour is established, and what risks emerge at scale. Australia's AI Safety Institute — established in 2024 and based in DSIT — is creating the first domestic institutional home for this work.",demand:"Rapidly growing",demandNote:"AI safety research is one of the most globally competitive emerging fields. In Australia, roles are concentrated at the AI Safety Institute, university research centres (ANU, Melbourne, UNSW), and the CSIRO's Data61. The field is expanding rapidly as government investment grows under the Cyber Security Strategy 2030. Competition from overseas AI labs — Anthropic, DeepMind, OpenAI — for the same talent pool keeps salaries high.",orgs:["Australia's AI Safety Institute — DSIT","University AI research centres — ANU, University of Melbourne, UNSW","Government science agencies — CSIRO Data61, DSTG","International AI labs with Australian operations"],quals:["Degree in computer science, mathematics, philosophy, or cognitive science","Masters or PhD in machine learning, AI alignment, or related field — strongly preferred","Strong publication record in NeurIPS, ICML, FAccT or equivalent venues","ISO 42001 and CIPP/E for those bridging into policy applications"]},

"ai-ethics":{career:"AI Ethics Researcher",tagline:"Maximum intentionality. You question the system before you optimise it.",desc:"AI Ethics Researchers approach every technology decision the same way: questioning whether the system should exist at all, for whom, and under what conditions before considering how to make it more efficient. Australia's Privacy Act 2024 automated decision-making transparency requirements and the AI Safety Institute's ethics work are creating institutional demand for this capability.",demand:"Rapidly growing",demandNote:"AI ethics as a professional function barely existed in Australia five years ago. Today the AI Safety Institute, DSIT, and the OAIC are all actively hiring for this capability, and technology companies are following. The Privacy Act 2024 automated decision-making provisions (effective December 2026) will create significant compliance demand. Salaries range from $100,000–$160,000, with research roles at leading universities competitive.",orgs:["Australia's AI Safety Institute","University research centres — ANU's Tech Policy Design Centre, Melbourne School of Engineering","Large technology companies deploying AI in regulated sectors","Civil society organisations — Australian Digital Rights Watch, Reset Australia"],quals:["Degree in philosophy, law, computer science, or public policy","Masters or PhD in AI ethics, technology law, or digital governance — increasingly expected","ISO 42001 and CIPP/E for applied practice credentials","Academic publication record expected for research roles — industry roles are more flexible"]},

"digital-trust":{career:"Digital Trust Consultant",tagline:"You are building the conditions for people to rely on systems they cannot see.",desc:"Digital Trust Consultants help organisations earn and maintain the trust of the people who use their systems: building the frameworks, running the assessments, and translating technical assurance into something meaningful to real people. The new statutory tort for serious invasions of privacy — effective June 2025 — has made 'trustworthy by design' a legal requirement, not just a marketing statement.",demand:"Rapidly growing",demandNote:"Digital trust as a distinct professional discipline is emerging rapidly in Australia. The Privacy Act 2024 statutory privacy tort, high-profile data breaches (Medibank, Optus, DP World), and increasing community expectations are driving organisations to invest in trust as a strategic asset. Salaries range from $110,000–$170,000. Consulting firms building digital trust practices are the primary hirers alongside large government digital services agencies.",orgs:["Technology companies seeking to build consumer trust — banking apps, health tech, govtech","Financial services institutions with large retail customer bases","Government digital services — myGov, ATO digital, Services Australia","Consulting firms building digital trust practices — KPMG, Deloitte, PwC"],quals:["Degree in law, IT, communications, or public policy","CIPP/A for privacy grounding — essential post-Privacy Act 2024 reforms","CIPT — Certified Information Privacy Technologist","ISO 27001 Lead Implementer or equivalent assurance framework experience"]},

"sec-consultant":{career:"Security Consultant",tagline:"Polished, adaptable, equally at home in any environment.",desc:"The iced latte works in a board meeting, at a standing desk, and at a Fitzroy rooftop bar. Security consultants are the same: moving between clients, industries, and technical contexts without breaking stride, translating complexity for whoever is in the room, and leaving organisations measurably better than they found them — before getting on the tram to the next engagement.",demand:"Very high",demandNote:"Security consulting demand in Australia is consistently among the highest on Seek, driven by regulatory pressure — SOCI Act, Privacy Act, APRA CPS 234 — and executive awareness of cyber risk. CyberCX, Tesserent, Sekuro, and the Big 4 are all actively hiring. The mid-market segment — organisations too small for a full-time team but too large to do without — is the fastest-growing client base. Salaries range from $110,000–$180,000.",orgs:["Big 4 consulting firms — Deloitte Cyber, PwC Cyber, KPMG Cyber Risk, EY Cyber","Specialist cybersecurity consultancies — CyberCX, Tesserent, Sekuro, Trustwave","Mid-tier advisory firms — Protiviti, Mandiant (Google), Accenture Security","Technology vendors with professional services arms"],quals:["Degree in IT, business, law, or engineering","CISSP for senior consulting credibility — widely expected at manager level and above","CISM for management consulting pathways","Big 4 or specialist consulting experience accelerates progression significantly"]},

"evangelist":{career:"Security Evangelist",tagline:"You make the complex genuinely appealing. The results speak for themselves.",desc:"Some purists look down on the frappuccino. Those people are missing the point — it gets more people engaged with coffee than any single-origin pour-over ever will. You make deeply technical concepts accessible, build the commercial case for security investment, and bring non-technical stakeholders along without making them feel patronised. In Australia's growing security vendor ecosystem, this skill is increasingly valued.",demand:"Growing",demandNote:"Security evangelism as a distinct function is growing as the Australian cyber security market matures and vendor competition intensifies. Cybersecurity vendors, consulting firms building their brand, and large enterprises investing in security culture are the primary hirers. Salaries range from $110,000–$180,000, with strong commission structures for commercially-oriented roles. Public speaking and written communication quality are the primary differentiators.",orgs:["Cybersecurity vendors with Australian operations — Palo Alto, CrowdStrike, Darktrace","Consulting firms in pre-sales and business development","AISA, ACS, and industry professional bodies — conference and event roles","Large enterprises building security culture programmes"],quals:["Degree in communications, business, IT, or marketing","CISSP or CompTIA Security+ for technical credibility — expected even in commercial roles","Sales engineering or product marketing background highly valued","Public speaking ability and published writing quality are the real qualifications here"]},

"awareness-lead":{career:"Security Awareness Lead",tagline:"The human layer is the most important control you have.",desc:"Security awareness is about changing human behaviour — making people feel safe enough to report mistakes rather than hide them, curious rather than paralysed. You measure success in culture shift, not click rates on phishing simulations. With human error involved in a significant majority of Australian data breaches, this role is no longer a training compliance function — it is a risk mitigation priority.",demand:"Growing",demandNote:"Security awareness and culture as a distinct function is growing as Australian organisations recognise the limits of technical controls. The ACSC's reporting consistently shows social engineering and phishing as primary attack vectors. Organisations that have experienced public breaches — healthcare networks, financial services — are investing most heavily. Salaries range from $90,000–$140,000. Adult learning and behaviour design skills are increasingly valued above traditional training delivery.",orgs:["Large enterprises across financial services, healthcare, and government","Financial services — banks and insurers with large retail workforces","Healthcare organisations — hospitals, health networks, aged care","Government departments — APS security culture programmes"],quals:["Degree in communications, psychology, education, or IT","SSAP — SANS Security Awareness and Training Professional","CompTIA Security+ for technical grounding and credibility with security teams","Adult learning, instructional design, or behavioural science qualifications increasingly valued"]},

"sec-trainer":{career:"Security Trainer & Educator",tagline:"You are here for the people, not the product.",desc:"You looked at the whole menu and ordered nothing — because you are not here for what is in the cup. You are here for the people sitting across the table. Security Trainers and Educators build the human foundation that all technical controls rest on. The ACS projects 54,000 additional cyber roles needed by 2030 — which means Australia needs far more educators than it currently has.",demand:"Growing",demandNote:"Security training and education is a growing function as Australia's critical skills shortage drives investment in domestic capability. TAFE institutions, RTOs, and universities are all expanding cyber security offerings. Corporate security training programmes have grown significantly following high-profile breaches. The APS Cyber Graduate Programme and the ASD's Australian Cyber Security Centre training initiatives are additional demand sources. Salaries range from $85,000–$130,000.",orgs:["TAFE institutions — TAFE NSW, TAFE Queensland, RMIT TAFE Victoria","Universities with cyber security programmes — Deakin, UNSW, ANU, University of Melbourne","Registered Training Organisations with cyber security offerings","Corporate learning and development functions — large employers with internal training teams"],quals:["Degree in education, instructional design, IT, or communications","Certificate IV in Training and Assessment (TAE40122) — required for formal RTO delivery","CompTIA Security+ or equivalent for technical grounding and subject matter credibility","SSAP — SANS Security Awareness and Training Professional for programme design"]},
};

function resolveCareer(drink,milk,flavour){
  if(drink==="no-coffee") return CAREERS["sec-trainer"];
  const base=BASE[drink]||"sec-analyst";
  const milkKey=milk&&milk!=="none"?milk:"none";
  const midKey=MILK_MOD[milkKey]?.[base]||base;
  const flavKey=flavour&&flavour!=="none"?flavour:"none";
  const finalKey=FLAVOUR_MOD[flavKey]?.[midKey]||midKey;
  return CAREERS[finalKey]||CAREERS[base]||CAREERS["sec-analyst"];
}
function buildOrderLabel(drink,milk,flavour){

  const ML={"full-cream":"Full Cream","oat":"Oat","almond":"Almond","soy":"Soy","lactose-free":"Lactose-Free","none":""};
  const FL={"extra-shot":"Extra Shot","vanilla":"Vanilla","caramel":"Caramel","hazelnut":"Hazelnut","cinnamon":"Cinnamon","none":""};
  let l=DL[drink]||drink;
  if(milk&&milk!=="none") l+=` / ${ML[milk]}`;
  if(flavour&&flavour!=="none") l+=` / ${FL[flavour]}`;
  return l;
}

// ─── CANVAS SHARE IMAGE ───────────────────────────────────────────────────────
function generateShareImage(dc, orderLabel, price, ts) {
  const S=1080;
  const cv=document.createElement("canvas"); cv.width=S; cv.height=S;
  const ctx=cv.getContext("2d");

  // White receipt on black
  ctx.fillStyle="#000"; ctx.fillRect(0,0,S,S);
  // Card
  const PAD=64;
  ctx.fillStyle="#fff"; ctx.fillRect(PAD,PAD,S-PAD*2,S-PAD*2);
  // Zigzag bottom edge (receipt tear)
  ctx.fillStyle="#000";
  const zW=14; const zY=S-PAD;
  for(let x=PAD;x<S-PAD;x+=zW){
    ctx.beginPath();
    ctx.moveTo(x,zY);
    ctx.lineTo(x+zW/2,zY+14);
    ctx.lineTo(x+zW,zY);
    ctx.closePath();ctx.fill();
  }

  // Dashed header rule
  ctx.strokeStyle="#000";ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(PAD+32,PAD+180);ctx.lineTo(S-PAD-32,PAD+180);ctx.stroke();
  ctx.setLineDash([]);

  // Header text
  ctx.fillStyle="#000";ctx.textAlign="center";
  ctx.font="700 12px 'Courier New',monospace";ctx.letterSpacing="3px";
  ctx.fillText("TAX INVOICE — MELBOURNE CBD",S/2,PAD+52);
  ctx.font="400 10px 'Courier New',monospace";ctx.letterSpacing="1px";
  ctx.fillText(`ORDER #${Math.floor(Math.random()*8999)+1000} // ${ts}`,S/2,PAD+78);
  ctx.font="900 68px Georgia,serif";ctx.letterSpacing="-1px";
  ctx.fillText(dc.career.toUpperCase(),S/2,PAD+152);
  ctx.font="italic 400 20px Georgia,serif";ctx.letterSpacing="0px";
  ctx.fillStyle="rgba(0,0,0,0.55)";
  ctx.fillText(`"${dc.tagline}"`,S/2,PAD+168);

  // Section: Order
  ctx.textAlign="left";ctx.fillStyle="rgba(0,0,0,0.4)";
  ctx.font="700 9px 'Courier New',monospace";ctx.letterSpacing="2px";
  ctx.fillText("ORDER SUMMARY",PAD+32,PAD+216);
  ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(PAD+32,PAD+228);ctx.lineTo(S-PAD-32,PAD+228);ctx.stroke();ctx.setLineDash([]);

  ctx.fillStyle="#000";ctx.font="400 14px 'Courier New',monospace";ctx.letterSpacing="0";
  function row(label,val,y){
    ctx.textAlign="left";ctx.fillText(label,PAD+32,y);
    ctx.textAlign="right";ctx.fillText(val,S-PAD-32,y);
  }
  row(`1x ${orderLabel}`,"$5.50",PAD+256);
  // Price breakdown handled in label already — show total
  ctx.textAlign="left";ctx.font="700 14px 'Courier New',monospace";
  ctx.beginPath();ctx.moveTo(PAD+32,PAD+280);ctx.lineTo(S-PAD-32,PAD+280);ctx.strokeStyle="#000";ctx.lineWidth=1;ctx.stroke();
  row("TOTAL DUE",price,PAD+304);

  // Section: Career
  ctx.fillStyle="rgba(0,0,0,0.4)";ctx.font="700 9px 'Courier New',monospace";ctx.letterSpacing="2px";ctx.textAlign="left";
  ctx.fillText("CYBER CAREER MAPPING",PAD+32,PAD+344);
  ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(PAD+32,PAD+356);ctx.lineTo(S-PAD-32,PAD+356);ctx.stroke();ctx.setLineDash([]);

  ctx.fillStyle="#000";ctx.font="400 13px 'Courier New',monospace";ctx.letterSpacing="0";
  // Wrap description — 3 lines max
  const words=dc.desc.split(" ");let line="";let y=PAD+384;let lcount=0;
  for(let n=0;n<words.length;n++){
    const t=line+words[n]+" ";
    if(ctx.measureText(t).width>S-PAD*2-64&&n>0){
      if(lcount>=3){ctx.fillText(line.trim()+"…",PAD+32,y);break;}
      ctx.fillText(line.trim(),PAD+32,y);line=words[n]+" ";y+=22;lcount++;
    }else line=t;
    if(n===words.length-1)ctx.fillText(line.trim(),PAD+32,y);
  }

  // Market demand
  ctx.font="700 11px 'Courier New',monospace";ctx.letterSpacing="1px";
  ctx.fillText(`MARKET DEMAND: ${dc.demand.toUpperCase()}`,PAD+32,y+38);

  // Footer
  ctx.fillStyle="rgba(0,0,0,0.3)";ctx.font="700 9px 'Courier New',monospace";ctx.letterSpacing="2px";ctx.textAlign="center";
  ctx.fillText("*".repeat(52),S/2,S-PAD-42);
  ctx.fillText("kimpanti.github.io/pourdecisions",S/2,S-PAD-20);

  const link=document.createElement("a");
  link.download=`pour-decisions-${dc.career.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"")}.png`;
  link.href=cv.toDataURL("image/png");link.click();
}

function DrinkStep({value,onChange}){
  const isI=value&&ICED.some(d=>d.val===value);
  const[tab,setTab]=useState(isI?"iced":"hot");
  function sw(t){setTab(t);if(t==="hot"&&ICED.some(d=>d.val===value))onChange("");if(t==="iced"&&HOT.some(d=>d.val===value))onChange("");}
  const drinks=tab==="hot"?HOT:ICED;
  return(<>
    <div className="tab-row">
      <button className={`tab-btn${tab==="hot"?" active":""}`} onClick={()=>sw("hot")}>Hot ☕</button>
      <button className={`tab-btn${tab==="iced"?" active":""}`} onClick={()=>sw("iced")}>Iced 🧊</button>
    </div>
    {drinks.map(d=>(
      <button key={d.val} className={`opt-btn${value===d.val?" sel":""}`} onClick={()=>onChange(d.val)}>{d.label}</button>
    ))}
    <div style={{marginTop:8,paddingTop:8,borderTop:"1px dashed rgba(255,255,255,0.1)"}}>
      <button className={`opt-btn${value==="no-coffee"?" sel":""}`} onClick={()=>onChange("no-coffee")}>I Don't Drink Coffee or Tea</button>
    </div>
  </>);
}

        <div className="r-section">
          <span className="r-label">Market Demand</span>
          <p style={{fontSize:12,fontWeight:700,marginBottom:6}}>{dc.demand}</p>
          <p style={{fontSize:11,lineHeight:1.6,opacity:0.7}}>{dc.demandNote}</p>
        </div>

        {/* Where you'd work */}
        <div className="r-section">
          <span className="r-label">Where You Would Work</span>
          {dc.orgs.map((o,i)=><p key={i} style={{fontSize:11,lineHeight:1.7}}>— {o}</p>)}
        </div>

        {/* Credentials */}
        <div className="r-section">
          <span className="r-label">Required Credentials</span>
          {dc.quals.map((q,i)=><p key={i} style={{fontSize:11,lineHeight:1.7}}>— {q}</p>)}
        </div>

        {/* Disclaimer */}
        <div style={{background:"#f8f8f8",padding:"14px",fontSize:10,color:"#555",border:"1px solid #eee",marginBottom:20,lineHeight:1.65}}>
          <strong>Disclaimer:</strong> For entertainment purposes only. Not career advice. Based on Australian market trends. Always consult a qualified career advisor before making significant professional changes.
        </div>

        {/* Did we get you right */}
        <div style={{textAlign:"center",marginBottom:18}}>
          <span className="r-label" style={{display:"block",textAlign:"center",marginBottom:12}}>Did We Get You Right?</span>
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            {[{val:"yes",label:"👍 That's me"},{val:"no",label:"👎 Not quite"}].map(btn=>(
              <button key={btn.val} onClick={()=>setReaction(btn.val)}
                style={{padding:"10px 20px",fontSize:12,fontFamily:"'Courier Prime',monospace",border:"1px solid #000",background:reaction===btn.val?"#000":"transparent",color:reaction===btn.val?"#fff":"#000",cursor:"pointer",fontWeight:700,letterSpacing:"1px"}}>
                {btn.label}
              </button>
            ))}
          </div>
          {reaction&&<p style={{fontSize:10,opacity:0.5,marginTop:10,letterSpacing:"1px",textTransform:"uppercase"}}>
            {reaction==="yes"?"Your coffee order knows you. Share it.":"Try again — "+CAREER_COUNT+" careers in here."}
          </p>}
        </div>

        {/* Share bar */}
        <span className="r-label" style={{textAlign:"center",display:"block"}}>Share Your Result</span>
        <div className="share-bar">
          <button className="s-btn" onClick={shareInstagram}>Instagram</button>
          <button className="s-btn" onClick={shareLinkedIn}>LinkedIn</button>
          <button className="s-btn" onClick={handleDownload}>{imgState==="saving"?"Saving…":"Download"}</button>
        </div>

      </div>{/* end receipt */}

      <button onClick={onRestart}
        style={{marginTop:32,display:"block",width:"100%",padding:"16px",background:"transparent",border:"none",color:"rgba(255,255,255,0.3)",fontSize:10,letterSpacing:"3px",textTransform:"uppercase",cursor:"pointer",fontFamily:"'Inter',sans-serif"}}>
        New Order ↺
      </button>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const shared=readParams();
  const[screen,setScreen]=useState(shared?"result":"intro");
  const[answers,setAnswers]=useState(shared||{});
  const[stepIdx,setStepIdx]=useState(0);

  const steps=getAllSteps(answers.drink||"");
  const step=steps[stepIdx]||steps[0];
  const currentVal=step?.id==="drink"?answers.drink:(step?.field?answers[step.field]:undefined);
  const pct=steps.length>1?(stepIdx/(steps.length-1))*100:0;

  function pick(val){
    if(step.id==="drink"){setAnswers(a=>({...a,drink:val,milk:undefined,flavour:undefined}));}
    else if(step.field){setAnswers(a=>({...a,[step.field]:val}));}
  }
  function next(){
    if(!currentVal) return;
    if(step.id==="drink"&&currentVal==="no-coffee"){setScreen("result");return;}
    const stepsForDrink=getAllSteps(step.id==="drink"?currentVal:(answers.drink||""));
    if(stepIdx<stepsForDrink.length-1){setStepIdx(i=>i+1);}
    else{setScreen("result");}
  }
  function back(){
    if(stepIdx===0)setScreen("intro");
    else setStepIdx(i=>i-1);
  }
  function restart(){
    window.history.replaceState({},"",window.location.pathname);
    setAnswers({});setStepIdx(0);setScreen("intro");
  }

  if(screen==="intro") return<IntroScreen onStart={()=>{setStepIdx(0);setScreen("quiz");}}/>;
  if(screen==="result") return<ResultScreen answers={answers} onRestart={restart}/>;
  return<QuizScreen step={step} stepIdx={stepIdx} totalSteps={steps.length} currentVal={currentVal} pct={pct} onPick={pick} onNext={next} onBack={back} drinkVal={answers.drink}/>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body></html>
