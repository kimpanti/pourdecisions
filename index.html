<title>Pour Decisions — Melbourne Coffee × Cyber Career Quiz</title>
<meta name="description" content="Your coffee order says more about your professional DNA than your LinkedIn profile does. Over 30 cyber careers mapped to what you order — and how you order it.">

<style>

</head><body><div id="root"></div>
<script type="text/babel">
const {useState} = React;

// ─── THEME ────────────────────────────────────────────────────────────────────
const F = "'Georgia','Times New Roman',serif";
const C = {
  bg:"#FAF7F2", bar:"#2C1A0E", accent:"#8B5E3C",
  pale:"#F5EDE3", border:"#D5C5B5", muted:"#9E8070",
  text:"#1C0F07", sub:"#6B5040", white:"#FFFFFF",
  gold:"#C8956A", body:"#3D2010", softGold:"#7A5030",
};

// ─── SITE URL ─────────────────────────────────────────────────────────────────
// Update this once you have your GitHub Pages URL, e.g.:
// "https://yourusername.github.io/pour-decisions"
const SITE_URL = "https://kimpanti.github.io/pourdecisions";

// ─── CAREER DATA ──────────────────────────────────────────────────────────────
const CAREERS = {
  "long-black":{label:"Long black",career:"CISO",tagline:"No fuss. No additions. No apologies.",desc:"You have seen every threat, managed every crisis, and earned every grey hair deliberately. The long black is the most uncompromising order on the menu — no milk, no sweetener, no explanation required. That is exactly how you lead. You speak in the language of risk, not technology, and the board leans in when you talk. You have been drinking long blacks since before the specialty wave and you were right the whole time.",demand:"Very high",demandNote:"Demand for CISOs in Australia is structurally outpacing supply. The talent pool at this level is thin — there are genuinely not enough experienced candidates for available roles. Entry is competitive but tenure is strong once you are in.",orgs:["ASX-listed corporates","Big 4 banks and financial services","Federal and state government agencies","Healthcare and critical infrastructure","Large professional services firms"],quals:["Undergraduate degree in IT, law, business, or engineering","CISSP or CISM — the industry benchmark at this level","10+ years progressive security experience across multiple domains","MBA or executive leadership programme common at senior level"]},
  "double-espresso":{label:"Double espresso",career:"Penetration Tester",tagline:"Fast, intense, straight to the weakness.",desc:"You are not here for the ambience. You are here to find where it breaks before someone else does. Methodical in practice, adversarial by instinct — you find genuine satisfaction in the gap between what a system claims to be and what it actually is. The barista has not handed back the change and you have already mapped three attack vectors.",demand:"High",demandNote:"Penetration testing demand is strong and growing as organisations mature their security programmes. Specialist offensive security skills remain genuinely scarce in Australia — particularly cloud and mobile penetration testing expertise.",orgs:["Specialist cybersecurity consultancies","Big 4 and mid-tier consulting firms","Financial services — in-house red teams","Defence and intelligence agencies","Technology vendors with security divisions"],quals:["Degree in computer science or cybersecurity — strong self-study paths are also genuinely valid","OSCP — the red team benchmark, non-negotiable at mid-senior level","CEH as a credible entry point","CTF competition history and home lab experience often matter more than formal qualifications at entry level"]},
  "flat-white":{label:"Flat white",career:"Security Engineer",tagline:"The reliable backbone. Everything runs better because you exist.",desc:"The flat white is the most Melbourne of all coffees — classic, precise, technically demanding to execute well but effortlessly functional when done right. You build and maintain the controls that everyone else relies on. Not flashy, not seeking recognition — infrastructure-minded, quietly excellent, and the first person called when something breaks at 2am during a Collingwood finals game.",demand:"Very high",demandNote:"Security engineering is one of the most in-demand roles in Australian cybersecurity. Cloud security engineering in particular is significantly undersupplied. This demand is durable — it follows technology adoption curves and is not easily automated.",orgs:["Technology companies and scale-ups","Financial services and fintech","Managed security service providers","Federal and state government","Healthcare and utilities"],quals:["Degree in computer science, software engineering, or information systems","AWS Security Specialty or equivalent cloud certification","GIAC GSEC for foundational credentialling","Hands-on DevSecOps pipeline experience increasingly expected across most sectors"]},
  "flat-white__oat":{label:"Flat white with oat milk",career:"Privacy Engineer",tagline:"The same technical depth — with ethics built in from the start.",desc:"Same base order as the Security Engineer, but the oat milk is not incidental — it signals that you care about the why behind the what. Privacy Engineers embed privacy into systems at the code and architecture layer: data minimisation by default, consent mechanisms that actually function, deletion pipelines that run automatically. You review the product brief before the first sprint starts and you are always the person who should have been consulted earlier.",demand:"High",demandNote:"Privacy engineering is an emerging specialism in Australia, driven by Privacy Act reform and increasing expectation from regulators that privacy be built in rather than bolted on. The talent pool is very small — the intersection of technical security skills and genuine privacy knowledge is genuinely rare.",orgs:["Technology companies operating in Australia","Financial services and healthcare — data-heavy sectors","Government agencies modernising digital services","Consulting firms with privacy and technology practices","Emerging privacy-tech vendors"],quals:["Degree in computer science, software engineering, or information systems","CIPT — Certified Information Privacy Technologist","AWS Security or equivalent for technical credentialling","CIPP/A to complement the technical pathway with privacy law grounding"]},
  "latte":{label:"Latte",career:"Security Analyst",tagline:"Approachable, well-rounded, and more capable than people assume.",desc:"The latte is the most ordered coffee in Australia and there is a reason for that — it is reliably good, broadly appealing, and works across every context. Security Analysts are the same: the essential generalist role that underpins every security function, capable of moving across domains, and the foundation from which most specialist careers are built. Nobody writes a longform piece about the latte and nobody writes one about the Security Analyst either. That does not mean either is anything less than essential.",demand:"Very high",demandNote:"Security Analyst is consistently one of the highest-vacancy roles in Australian cybersecurity. The breadth of the role means it appears across virtually every sector and organisation size. The pathway from Security Analyst into specialist roles is well-established and well-trodden.",orgs:["Every major sector — finance, healthcare, government, technology","Managed security service providers","In-house security teams at mid-to-large enterprises","Consulting firms at entry and mid-level","Government departments at all levels"],quals:["Degree in IT, cybersecurity, or computer science — or a credible self-study pathway","CompTIA Security+ as a foundational entry credential","GIAC GSEC for progression","ASD Essential Eight training increasingly valued in Australian government and enterprise contexts"]},
  "latte__none":{label:"Latte, black — no milk",career:"Chief Privacy Officer",tagline:"You have transcended the need for comfort. You are the governance layer above everything else.",desc:"The latte drinker who removes the milk entirely has stripped the order back to its most essential, uncompromising form. The Chief Privacy Officer sets strategy, influences culture, advises the board, and makes decisions that shape how an entire organisation treats the people whose data it holds. You started as someone who appreciated the accessible, well-rounded option. You transcended it. The OAIC knows your name.",demand:"High",demandNote:"CPO demand in Australia is being driven by Privacy Act reform, increased OAIC enforcement, and growing board-level awareness of privacy risk. The role is maturing from a compliance function into a genuine strategic leadership position — compensation and seniority are rising accordingly.",orgs:["Large technology companies","Financial services institutions","Healthcare organisations handling sensitive clinical data","Federal government agencies","Telecommunications and media companies"],quals:["Law degree — LLB or JD — the most common pathway","CIPP/A and CIPM as the credential combination for Australian practice","IAPP Fellowship at the most senior level","15+ years progressive privacy, legal, or governance experience typically expected"]},
  "cappuccino":{label:"Cappuccino",career:"IT Auditor",tagline:"The ratio matters. The framework matters. You are the one who checks.",desc:"A cappuccino is one-third espresso, one-third steamed milk, one-third foam — and if any of those thirds is wrong, you will know immediately. IT Auditors care about ratios, frameworks, and whether the documented control matches the actual control. You are the person who reads the policy and then tests whether anyone follows it. Structured, respected, methodical, and quietly capable of making an entire risk committee uncomfortable. The foam is the audit trail. It had better be right.",demand:"High",demandNote:"IT audit demand in Australia is strong and stable, driven by regulatory requirements, board governance expectations, and the growing scope of technology in business. The role is increasingly specialised as cloud, AI, and automated systems require auditors with genuine technical literacy.",orgs:["Big 4 and mid-tier accounting and consulting firms","Internal audit functions at ASX-listed companies","Financial services — APRA-regulated entities","Government agencies with audit and assurance mandates","Technology companies subject to regulatory audit"],quals:["Degree in IT, accounting, business, or law","CISA — Certified Information Systems Auditor — the most recognised credential in this field","CRISC for risk-adjacent audit work","Chartered membership of IIA Australia — Institute of Internal Auditors"]},
  "pour-over":{label:"Pour-over single origin",career:"Threat Intelligence Analyst",tagline:"Patient, detail-obsessed, cares deeply about provenance.",desc:"You read the tasting notes. You also read the threat feeds, dark web forums, and MITRE ATT&CK at 11pm because you find it genuinely interesting. Pour-over requires patience, precision, and real curiosity about where something came from. Threat intelligence is the same discipline applied to adversaries rather than Ethiopian naturals. You order at the bar in Fitzroy and you know the farm name. Both of them.",demand:"High",demandNote:"Threat intelligence is an emerging specialism in the Australian market — most mid-sized organisations are only beginning to build this capability. Demand will grow significantly as organisations move from reactive to proactive security postures. Geopolitical fluency is becoming a genuine differentiator.",orgs:["Government and intelligence agencies — ASD, AFP, ASIO","Financial services institutions","Critical infrastructure operators","Large consulting firms with threat intelligence practices","Technology and telecommunications companies"],quals:["Degree in IT, intelligence studies, criminology, or international relations","GCTI — GIAC Cyber Threat Intelligence","CompTIA CySA+ as an entry credential","Language skills and geopolitical knowledge valued at senior levels"]},
  "pour-over__almond":{label:"Pour-over with almond milk",career:"Cyber Threat Hunter",tagline:"You do not wait for alerts. You go looking.",desc:"The almond milk pour-over person is doing something slightly unconventional and they know it — and they are fine with that, because it is better. Cyber Threat Hunters proactively search through networks and systems for threats that have evaded automated detection, operating ahead of the alert queue rather than behind it. Independent by instinct, highly technical by necessity. The boutique specialist who does the work the standard tooling cannot.",demand:"High",demandNote:"Threat hunting as a distinct function is growing rapidly in Australia as organisations with mature security programmes move beyond reactive detection. Very few practitioners have the combination of technical depth and proactive mindset this role requires.",orgs:["Managed security service providers with advanced practice","Financial services institutions with mature security operations","Defence and intelligence agencies","Large technology companies with internal security teams","Specialist cybersecurity consultancies"],quals:["Degree in computer science or cybersecurity","GIAC GCIH — Certified Incident Handler as a foundation","GCFA — GIAC Certified Forensic Analyst","3–5 years SOC or incident response experience typically expected before moving into threat hunting"]},
  "magic":{label:"Magic",career:"AI Governance Professional",tagline:"Niche, emerging — and about to be everywhere.",desc:"The Magic is Melbourne's own — a double ristretto over three-quarters of a cup of steamed milk. Most people outside Victoria have never heard of it. Order one interstate and watch the confusion. In 2026 that is exactly what AI governance is: a discipline being built from scratch, that most organisations do not yet have, and that is about to become one of the most in-demand roles in the country. You were ordering it before it was on the menu.",demand:"Rapidly growing",demandNote:"AI governance is the fastest-growing specialism in the GRC space in Australia. Supply of qualified practitioners is critically low relative to regulatory pressure from the EU AI Act, Australia's AI Ethics Principles, and ISO 42001. First-mover advantage in this field is significant.",orgs:["Technology companies deploying AI products","Financial services regulators and regulated entities","Government departments and agencies","Professional services firms building AI governance practices","Healthcare and pharmaceutical companies using AI in clinical settings"],quals:["Degree in law, philosophy, computer science, or public policy","ISO 42001 AI Management Systems — the most relevant emerging certification","CIPP/A or CIPP/E for the privacy-adjacent pathway","Masters in AI ethics, technology law, or digital governance increasingly common for senior roles"]},
  "magic__oat":{label:"Magic with oat milk",career:"AI Safety Researcher",tagline:"You are not asking how to make it faster. You are asking whether it should exist.",desc:"The Magic with oat milk is a deeply intentional order — every element chosen for a reason. AI Safety Researchers operate at the technical and philosophical frontier: studying how large language models fail, how alignment between human values and AI behaviour is established, and what risks emerge at scale. This is the more technically rigorous sibling of AI governance — less policy, more research. You are thinking about problems that will not become mainstream concerns for another decade.",demand:"Rapidly growing",demandNote:"AI safety research is one of the most globally competitive emerging fields. In Australia, roles are concentrated in research institutions and emerging AI labs — but the field is expanding rapidly and government interest is growing.",orgs:["University AI research centres","Government science agencies — CSIRO, DSTG","International AI labs with Australian operations","Think tanks and policy research organisations","Technology companies with AI safety functions"],quals:["Degree in computer science, mathematics, philosophy, or cognitive science","Masters or PhD in machine learning, AI alignment, or related field — strongly preferred","Strong publication record in top-tier ML or AI ethics venues","CIPP/E and ISO 42001 for those bridging into policy applications"]},
  "chai-latte":{label:"Chai latte",career:"Privacy Counsel",tagline:"Warm, values-driven, thinks about people before systems.",desc:"You chose the chai because the experience mattered as much as the function — and you approach privacy exactly the same way. The individual at the centre, the system built around them. You understand the Australian Privacy Act the way a South Yarra barista understands their seasonal menu: not just the rules but the intention and the craft behind them. You are who organisations call when they want to get it right, not just get it done.",demand:"High",demandNote:"Privacy law expertise is in strong demand across Australian industry, driven by Privacy Act reform, the Notifiable Data Breaches scheme, and increasing OAIC enforcement activity. Legal professionals with genuine technology literacy command a significant premium.",orgs:["Law firms with technology and privacy practices","In-house legal teams at large corporations","Financial services and healthcare organisations","Government agencies — OAIC, ATO, Services Australia","Technology companies operating in Australia"],quals:["Law degree — LLB or JD — strongly preferred for this pathway","CIPP/A — the most market-relevant credential for Australian privacy practice","CIPM for management-level practice","Graduate Diploma in Legal Practice if coming from a non-practising background"]},
  "chai-latte__oat":{label:"Chai latte with oat milk",career:"Data Protection Officer",tagline:"The corporate conscience. You sit between the organisation and the regulator.",desc:"Same warmth, same values, same commitment to doing right by people, but operating within a more structured institutional framework. Where the Privacy Counsel advises on the law, the DPO operationalises it inside the organisation: building the programme, managing the register, handling subject access requests, and being the face the regulator sees. You keep the organisation honest, day in and day out.",demand:"High",demandNote:"Data Protection Officer roles are growing in Australian organisations, particularly those with European operations subject to GDPR, and ahead of strengthened Australian Privacy Act obligations. The role is becoming a standalone senior function rather than an add-on to the general counsel portfolio.",orgs:["Large corporates with European market exposure","Financial services and healthcare — regulated sectors","Technology platforms handling significant personal data","Government agencies with large data holdings","Retail and e-commerce companies"],quals:["Degree in law, business, or IT","CIPP/A for Australian privacy — essential","CIPP/E if European operations are in scope","CIPM for programme management and operations"]},
  "cold-brew":{label:"Cold brew",career:"Security Operations Manager",tagline:"Always running. Never switched off. Patient by design.",desc:"Cold brew is not instant gratification — it brews for 12 to 24 hours, always on in the background, producing something more durable than anything rushed. Security Operations Managers are exactly that: the operational backbone that never stops, coordinates the SOC, owns the incident response programme, and keeps everything running while the rest of Melbourne sleeps. You started ordering cold brew when everyone else still thought it was just iced coffee.",demand:"High",demandNote:"Security operations management is a stable, high-demand function across all large organisations in Australia. The role is evolving rapidly as AI-assisted tooling changes the shape of SOC work — managers who understand both the operational and strategic dimensions are particularly sought after.",orgs:["Managed security service providers","Financial services institutions","Telecommunications and utilities","Large government departments","Healthcare networks"],quals:["Degree in IT, cybersecurity, or business","CISM for management credentialling","3–5 years SOC analyst or incident response experience typically expected before management roles","GIAC GSOM or equivalent operations management certification"]},
  "cold-brew__soy":{label:"Cold brew with soy milk",career:"Detection & Response Engineer",tagline:"You do not just watch for threats. You build the systems that catch them.",desc:"The soy cold brew person was doing this before it was mainstream. Detection and Response Engineers build and tune the detection infrastructure — SIEM rules, EDR configurations, detection logic, and response playbooks — that the SOC operates from. Where the SOC Analyst responds to alerts, you design the systems that generate them. Deeply technical, quietly foundational.",demand:"Very high",demandNote:"Detection engineering is one of the fastest-growing technical specialisms in Australian cybersecurity. The shift from off-the-shelf detection to bespoke, high-fidelity detection logic is accelerating — organisations that have experienced breaches are investing heavily in this capability.",orgs:["Financial services institutions with mature security programmes","Managed security service providers with advanced practice","Technology companies and scale-ups","Defence and intelligence agencies","Large telecommunications companies"],quals:["Degree in computer science or cybersecurity","GIAC GSEC as a foundation","GIAC GCIA — Certified Intrusion Analyst","Hands-on SIEM engineering experience — Splunk, Microsoft Sentinel, or Elastic — typically expected"]},
  "batch-brew":{label:"Batch brew / filter",career:"SOC Analyst",tagline:"Underappreciated, always on, and quietly indispensable.",desc:"Batch brew is always there — reliable, consistent, ready before you ask. Nobody photographs it for Instagram. But remove it from the café and everything slows down. You are monitoring alerts at 3am while the rest of Melbourne sleeps, triaging incidents before they become crises, and maintaining the baseline awareness that makes everything else possible.",demand:"High",demandNote:"SOC analyst demand is strong across Australia. AI-assisted tooling is changing the nature of the work — Tier 1 triage is increasingly automated, which means the premium is shifting toward analysts who can handle complex investigation and contextual judgement. Upskilling into threat intelligence or incident response is the natural progression.",orgs:["Managed security service providers — the most common entry point","Financial services SOC teams","Government and defence","Telecommunications companies","Large enterprises with internal security operations"],quals:["Degree in IT, cybersecurity, or computer science — or a strong self-study equivalent","CompTIA Security+ as a foundational entry credential","GIAC GSEC for progression","Operational discipline and shift work tolerance matter as much as credentials at entry level"]},
  "batch-brew__lactose-free":{label:"Batch brew with lactose-free milk",career:"Incident Response Analyst",tagline:"You want the same outcome as everyone else. You have found your own path to it.",desc:"The lactose-free batch brew person wants the reliable, always-on experience — but they have adapted their approach to suit their specific situation, and that pragmatic flexibility is their professional signature. Incident Response Analysts step in when something goes wrong: calm under pressure, clear process, focused on containment and recovery. You do not need perfect conditions to perform. You just need to know what to do next.",demand:"Very high",demandNote:"Incident response is one of the most in-demand specialisms in Australian cybersecurity, driven by increasing breach frequency and regulatory requirements around breach notification timeframes. Experienced IR practitioners are genuinely scarce and command significant premiums.",orgs:["Specialist incident response consultancies","Big 4 and mid-tier consulting firms with cyber practice","Managed security service providers","Financial services institutions with in-house IR capability","Government agencies — ASD ACSC, state cyber agencies"],quals:["Degree in IT, cybersecurity, or computer science","GIAC GCIH — Certified Incident Handler","GCFE or GCFA for forensics capability","Tabletop exercise facilitation experience valued at senior levels"]},
  "hot-choc":{label:"Hot chocolate",career:"Cyber Risk Analyst",tagline:"Do not underestimate the depth. Warmth is your professional superpower.",desc:"The hot chocolate person is perennially underestimated — and that is entirely your competitive advantage. You translate genuinely complex technical risk into language that boards understand and act on. The best Cyber Risk Analysts in Melbourne hold a conversation in a Southbank boardroom and a Carlton dev team standup on the same afternoon and land perfectly in both rooms.",demand:"Very high",demandNote:"Cyber risk quantification and board-level risk communication are among the most undersupplied capabilities in Australian cybersecurity. The shift toward risk-based security frameworks is accelerating this demand. Professionals who combine technical literacy with business communication are exceptionally scarce.",orgs:["Big 4 and mid-tier consulting firms","ASX-listed corporates — in-house risk functions","Financial services regulators and regulated entities","Insurance companies building cyber risk practices","Government departments with enterprise risk functions"],quals:["Degree in business, finance, law, IT, or engineering","CRISC — Certified in Risk and Information Systems Control","CISA for audit-adjacent pathways","CPA or CA background useful if coming from a finance or internal audit pathway"]},
  "hot-choc__full-cream":{label:"Hot chocolate with full cream milk",career:"Enterprise Risk Manager",tagline:"You see the whole picture. Cyber is one chapter, not the whole story.",desc:"Full cream hot chocolate is the classic — rich, satisfying, and broader in ambition than a single-origin anything. Enterprise Risk Managers sit above cyber risk and manage the full portfolio: operational, strategic, financial, reputational, and cyber risk in a unified framework. You understand that a ransomware attack is also a business continuity event, a reputational event, and a financial event — and you plan accordingly. The board does not see you as the IT risk person.",demand:"High",demandNote:"Enterprise risk management with genuine cyber literacy is a growing and well-compensated niche in Australia. Most ERM professionals lack technical depth; most cyber professionals lack enterprise risk breadth. Practitioners who have genuinely developed both are sought after at board and executive level.",orgs:["ASX-listed corporates — Group Risk functions","Financial services institutions","Insurance companies","Large government departments","Infrastructure and utilities companies"],quals:["Degree in business, finance, law, or engineering","CRISC — Certified in Risk and Information Systems Control","CISM for cyber risk depth","Chartered membership of Risk Australia (IRM) or equivalent professional body"]},
  "matcha":{label:"Matcha latte",career:"Digital Forensics Investigator",tagline:"You notice things others walk past. You reconstruct stories from fragments.",desc:"Matcha has a long history, a complex preparation process, and a profile most people have never taken the time to properly understand. Digital forensics is finding evidence in places others have already declared clean. You are methodical, patient, and deeply uncomfortable with loose ends. You do your best work when everyone else has given up. You order the matcha at a Brunswick café and you already know what the barista did wrong.",demand:"Moderate to high",demandNote:"Digital forensics is a specialist field with steady demand driven by litigation support, regulatory investigations, and law enforcement. Cloud forensics is an emerging sub-specialism with very few qualified practitioners in Australia currently.",orgs:["Law enforcement — AFP, state police","Law firms requiring litigation support","Government agencies and regulators","Specialist forensics consultancies","Large financial institutions with internal investigation teams"],quals:["Degree in computer science, cybersecurity, criminology, or law","GCFE — GIAC Certified Forensic Examiner","EnCE — EnCase Certified Examiner","Law enforcement or legal background provides significant advantage at senior levels"]},
  "tea":{label:"Tea",career:"Information Security Manager",tagline:"Steady, considered, in it for the long run.",desc:"You looked at the whole menu and you chose tea. Not because you could not decide, but because you thought about it properly and tea is what you actually wanted. Information Security Managers are the steady backbone of the profession — deeply reliable, broadly capable, and with an institutional knowledge of risk that comes from years of patient, methodical practice. The organisation does not always realise how much it depends on you until you are gone.",demand:"High",demandNote:"Information Security Manager is a stable, well-compensated role across Australian industry. It is the natural progression from senior technical roles into management, and the natural entry point for experienced managers transitioning into cybersecurity from adjacent fields. Demand is consistent and broad.",orgs:["Every major sector — the role exists wherever IT and risk intersect","Financial services and healthcare at senior levels","Government departments","Large corporates across manufacturing, retail, and professional services","Managed security service providers at programme management level"],quals:["Degree in IT, business, or engineering","CISM — Certified Information Security Manager — the most directly relevant credential","ISO 27001 Lead Implementer for standards-based environments","5–8 years of progressive security experience typically expected"]},
  "iced-long-black":{label:"Iced long black / cold drip",career:"Red Team Lead",tagline:"Methodical, patient, willing to wait as long as it takes.",desc:"Cold drip takes up to 12 hours to produce. You are not in a rush — you are thorough. Red team work requires the patience to plan multi-stage attack scenarios across weeks, the discipline to document every step, and the honesty to report findings that make your colleagues uncomfortable. You have been drinking cold drip since before it was nine dollars at a Collingwood café.",demand:"High",demandNote:"Red team and offensive security talent is chronically undersupplied in Australia. Most organisations at the maturity level to run red team exercises struggle to find qualified practitioners. The pipeline through penetration testing is narrow, keeping demand structurally elevated.",orgs:["Specialist offensive security consultancies","Defence and intelligence agencies","Financial services with mature security programmes","Large technology companies","Government security agencies"],quals:["Degree in computer science or cybersecurity — strong self-study pathways also credible","OSCP — non-negotiable at mid-senior level","GPEN — GIAC Penetration Tester","CTF competition history and active research contributions are highly regarded"]},
  "iced-latte":{label:"Iced latte",career:"Security Consultant",tagline:"Polished, adaptable, equally at home in any environment.",desc:"The iced latte works in a board meeting, at a standing desk, and at a Fitzroy rooftop bar. Security consultants are the same: moving between clients, industries, and technical contexts without breaking stride, translating complexity for whoever is in the room, and leaving organisations measurably better than they found them — before getting on the tram to the next engagement.",demand:"Very high",demandNote:"Security consulting demand in Australia is consistently strong and growing alongside regulatory pressure and executive awareness of cyber risk. Mid-market organisations that cannot justify a full-time security team are the fastest-growing client segment.",orgs:["Big 4 consulting firms","Mid-tier advisory firms","Boutique cybersecurity consultancies","Technology vendors with professional services arms","Independent consulting"],quals:["Degree in IT, business, law, or engineering","CISSP for senior consulting credibility","CISM for management consulting pathways","Big 4 or specialist consulting experience accelerates progression significantly"]},
  "iced-latte__oat":{label:"Iced latte with oat milk",career:"Third Party Risk Manager",tagline:"You trust but verify. Mostly you just verify.",desc:"The oat milk iced latte is the consulting order with a values overlay — same professionalism and adaptability, but with an eye on how the whole supply chain is operating. Third Party Risk Managers assess and manage the security and compliance risks that enter an organisation through its vendors, suppliers, and partners. You are the person who reads the supplier contract clauses that nobody else reads and asks the questions that nobody else asks.",demand:"Very high",demandNote:"Third party and supply chain risk management is one of the fastest-growing functions in Australian GRC, driven by high-profile supply chain incidents and increasing regulatory expectations around vendor risk management in financial services, healthcare, and critical infrastructure.",orgs:["Financial services institutions with large vendor ecosystems","Healthcare and pharmaceutical companies","Telecommunications and critical infrastructure operators","Government agencies with complex supply chains","Big 4 and mid-tier consulting firms"],quals:["Degree in IT, business, law, or accounting","CISA or CRISC for risk and audit credentialling","ISO 27001 Lead Auditor for vendor assessment work","Procurement or contract management background provides a significant practical advantage"]},
  "iced-matcha":{label:"Iced matcha latte",career:"Cyber Policy Analyst",tagline:"Operating at the intersection of technology and society.",desc:"You are not building systems or breaking them — you are shaping the rules that govern them. You understand technology well enough to know when a policy proposal is technically illiterate, and you understand politics well enough to know when a technically perfect proposal will never survive the process. You order the iced matcha at a Lygon Street café and you are already thinking about the ASD's Essential Eight. The two things are not unrelated.",demand:"Growing",demandNote:"Cyber policy is an emerging function in both government and industry in Australia, driven by expanding regulation, geopolitical cyber risk, and increased government investment in national cyber resilience. A rare opportunity to get in early in a field that will matter enormously.",orgs:["Australian Signals Directorate and ACSC","Department of Home Affairs","State government cybersecurity agencies","Industry peak bodies and policy organisations","Think tanks and research institutes"],quals:["Degree in law, public policy, political science, or international relations","CIPP/G for government and policy pathway","Graduate research background — Honours, Masters, or PhD — common in this field","IAPP Fellow designation at senior levels"]},
  "iced-matcha__oat":{label:"Iced matcha latte with oat milk",career:"Digital Trust Consultant",tagline:"You are building the conditions for people to rely on systems they cannot see.",desc:"Iced matcha with oat milk is a precise, principled order — every element chosen with intention, at the thoughtful intersection of technology and values. Digital Trust Consultants help organisations earn and maintain the trust of the people who use their systems: building the frameworks, running the assessments, and translating technical assurance into something meaningful to real people. You are not just checking compliance. You are asking whether this system deserves to be trusted in the first place.",demand:"Rapidly growing",demandNote:"Digital trust as a distinct professional discipline is emerging rapidly in Australia, driven by increasing community expectations, high-profile data breaches, and regulatory pressure. Organisations are beginning to treat trust as a strategic asset rather than a compliance outcome — and practitioners who can operationalise that shift are genuinely rare.",orgs:["Technology companies seeking to build consumer trust","Financial services institutions with large retail customer bases","Government digital services agencies","Consulting firms building digital trust practices","Industry bodies and standards organisations"],quals:["Degree in law, IT, communications, or public policy","CIPP/A for privacy grounding","CIPT — Certified Information Privacy Technologist for technical credentialling","ISO 27001 Lead Implementer or equivalent assurance framework experience"]},
  "iced-matcha__almond":{label:"Iced matcha with almond milk",career:"Security Policy Writer",tagline:"You give complex ideas their clearest, most useful form.",desc:"The almond milk iced matcha is a precise, independent choice — done the way the person wants it, not the way it comes by default. Security Policy Writers produce the policies, standards, procedures, and guidelines that govern how an organisation manages its security. Precise, thorough, independent in their judgement. Often contracted or freelance. The people who write the documents that everyone else is held accountable to.",demand:"Growing",demandNote:"Security policy and technical documentation is a growing specialism as organisations formalise their security programmes ahead of regulatory scrutiny. Skilled practitioners who understand both the technical and governance dimensions are uncommon.",orgs:["Specialist GRC consultancies","Government agencies building security frameworks","Large enterprises formalising their security programmes","Compliance software vendors","Independent contracting across most sectors"],quals:["Degree in communications, IT, law, or English","CISM or CISA for governance context","ISO 27001 Lead Implementer for framework knowledge","A strong technical writing portfolio is the most important credential — everything else supports it"]},
  "iced-chai":{label:"Iced chai",career:"Security Awareness Lead",tagline:"The human layer is the most important control you have.",desc:"You chose the iced chai because it felt right and you are always thinking about how things land with the people experiencing them. Security awareness is about changing human behaviour — making people feel safe enough to report mistakes rather than hide them, curious rather than paralysed. You measure success in culture shift, not click rates on phishing simulations.",demand:"Growing",demandNote:"Security awareness and culture as a distinct professional function is growing as the limits of technical controls become clearer. The role is evolving from awareness training delivery to genuine security culture leadership — organisations with mature programmes are seeing measurable risk reduction.",orgs:["Large enterprises across all sectors","Financial services institutions","Healthcare organisations with large non-technical workforces","Government departments","Education institutions"],quals:["Degree in communications, psychology, education, or IT","SSAP — Security Awareness and Training credential","CompTIA Security+ for technical grounding and credibility","Adult learning and instructional design qualifications increasingly valued in this role"]},
  "nitro":{label:"Nitro cold brew",career:"Cloud Security Architect",tagline:"Early adopter. Engineered under pressure. Ahead before anyone noticed.",desc:"Nitro cold brew runs under nitrogen pressure — it delivers more than regular cold brew, the texture is smoother, and it is slightly intimidating to people who do not understand what they are looking at. You were designing zero-trust cloud architectures when most organisations were still debating whether to move to the cloud. The café just started doing nitro. You already have opinions about the pressure settings.",demand:"Very high",demandNote:"Cloud security architecture is one of the most critically undersupplied capabilities in Australian cybersecurity. The gap between cloud adoption velocity and cloud security maturity is large and widening. Practitioners with deep architectural experience across multiple cloud platforms are exceptionally scarce.",orgs:["Hyperscaler partners — AWS, Microsoft, Google","Financial services mid-cloud-migration","Technology companies and scale-ups","Government agencies in whole-of-government cloud programmes","Large enterprise IT departments"],quals:["Degree in computer science, software engineering, or information systems","AWS Security Specialty — the most recognised credential in this space","CCSP — Certified Cloud Security Professional","Solutions or enterprise architecture background commonly precedes this specialisation"]},
  "nitro__soy":{label:"Nitro cold brew with soy milk",career:"DevSecOps Engineer",tagline:"Security is not a gate. You build it into the pipeline from the start.",desc:"Soy milk in a nitro cold brew is technically precise and slightly ahead of the curve — the order of someone who knows exactly what they want and why. DevSecOps Engineers integrate security into the software development and deployment lifecycle rather than applying it at the end. You write the security tests that run in the CI/CD pipeline, build the infrastructure-as-code that provisions securely by default, and make security feel like a feature rather than a friction point.",demand:"Very high",demandNote:"DevSecOps is one of the most in-demand technical roles in Australian technology organisations. Practitioners who can operate fluently in both security and engineering cultures are rare and consistently well-compensated.",orgs:["Technology companies and scale-ups","Financial services companies modernising their technology stack","Government agencies running digital transformation programmes","Managed security service providers with development capability","Software vendors with security-sensitive products"],quals:["Degree in computer science, software engineering, or information systems","AWS DevOps Engineer or equivalent cloud certification","GIAC GWEB — Web Application Defender","Hands-on experience with CI/CD tooling — GitHub Actions, GitLab CI, Jenkins — typically essential"]},
  "frappuccino":{label:"Frappuccino / blended iced coffee",career:"Security Evangelist",tagline:"You make the complex genuinely appealing. The results speak for themselves.",desc:"Some purists look down on the frappuccino. Those people are missing the point — it gets more people engaged with coffee than any single-origin pour-over ever will. You make deeply technical concepts accessible, build the commercial case for security investment, and bring non-technical stakeholders along for the journey without making them feel patronised. You have gotten more done in one CBD lunch than most get done in a quarter.",demand:"Growing",demandNote:"Security evangelism as a distinct function is growing as organisations recognise that technical controls alone are insufficient without executive buy-in. Practitioners who can operate credibly in both technical and commercial registers are rare and increasingly sought after.",orgs:["Cybersecurity vendors and technology companies","Consulting firms in pre-sales and business development","Industry associations and professional bodies","Large enterprises building security culture programmes","Conference and media organisations"],quals:["Degree in communications, business, IT, or marketing","CISSP or CompTIA Security+ for technical credibility","Sales engineering or product marketing experience valued highly","Public speaking ability and written communication quality are the real qualifications — everything else is supporting evidence"]},
  "dirty-chai":{label:"Iced dirty chai",career:"GRC Consultant",tagline:"Two worlds colliding perfectly. This intersection is your competitive advantage.",desc:"An iced dirty chai is an espresso shot pulled into chai over ice — two things that should not work together but absolutely do when executed well. Technical enough to understand the systems, legally-minded enough to govern them, commercially sharp enough to explain it to the CFO, and structured enough to document everything in a way that survives an audit. Every risk and compliance team in Melbourne wants to hire you.",demand:"Very high",demandNote:"GRC is one of the most consistently in-demand functions in Australian cybersecurity, driven by regulatory expansion, board accountability for cyber risk, and the growing complexity of compliance obligations. Genuinely strong GRC practitioners are rare.",orgs:["Big 4 and mid-tier consulting firms","Financial services regulators and regulated entities","ASX-listed corporates with in-house GRC functions","Healthcare, energy, and telecommunications","Government agencies with compliance obligations"],quals:["Degree in law, business, IT, or accounting","CISA — Certified Information Systems Auditor","CRISC for risk specialisation","Big 4 audit or consulting background is the most common and fastest pathway into senior GRC roles"]},
  "dirty-chai__full-cream":{label:"Iced dirty chai with full cream milk",career:"Compliance Manager",tagline:"You make sure the organisation does what it said it would do.",desc:"Full cream dirty chai is a more substantial, traditional commitment — the same two-world combination but with the texture of something built to last inside one organisation rather than across many. Compliance Managers build and maintain the internal frameworks that ensure ongoing adherence to regulatory obligations, industry standards, and internal policy. Where the GRC Consultant moves between engagements, you build something durable. You are the institutional memory and the audit trail all at once.",demand:"High",demandNote:"Compliance management is a stable, growing function in Australian organisations particularly in regulated sectors. The increasing volume of regulatory obligations is expanding both the scope and seniority of these roles.",orgs:["Financial services institutions — APRA-regulated entities","Healthcare and pharmaceutical companies","Telecommunications and critical infrastructure operators","Large ASX-listed corporates","Government agencies"],quals:["Degree in law, business, IT, or accounting","CISA as a foundational audit and compliance credential","ISO 27001 Lead Implementer for framework management","Sector-specific regulatory knowledge — APRA CPS 234, Privacy Act, SOCI Act — is often more valuable than generic credentials"]},
  "iced-matcha-foam":{label:"Iced matcha, oat, cold foam",career:"AI Ethics Researcher",tagline:"Maximum intentionality. You question the system before you optimise it.",desc:"Every layer of this order is a deliberate choice — the matcha for the antioxidants, the oat because it matters, the cold foam because texture and experience are not optional considerations. AI Ethics Researchers approach every technology decision the same way: questioning whether the system should exist at all, for whom, and under what conditions before considering how to make it more efficient. The cold foam settles while you wait for everyone else to catch up.",demand:"Rapidly growing",demandNote:"AI ethics as a professional function barely existed in Australia five years ago. Today it is a board-level agenda item. The gap between where the conversation is and where qualified practitioners are is significant.",orgs:["University research centres","Government agencies and policy bodies","Large technology companies deploying AI at scale","Professional services firms building AI ethics practices","Civil society organisations focused on technology accountability"],quals:["Degree in philosophy, law, computer science, or public policy","Masters or PhD in AI ethics, technology law, or digital governance — common and increasingly expected","ISO 42001 and CIPP/E for applied practice credentials","Academic publication record expected for research roles — industry roles are more flexible"]},

function buildLabel(drink,milk,flavour){
  const dn=DRINK_NAMES[drink]||drink;
  const ml=milk&&milk!=="none"?(MILK[milk]?.label||""):"";
  const fl=flavour&&flavour!=="none"?(FLAVOUR[flavour]?.label||""):"";
  let l=dn;
  if(ml) l+=` with ${ml.toLowerCase()}`;
  if(fl) l+=`, ${fl.toLowerCase()}`;
  return l;
}

function resolveCareer(drink,milk,flavour){
  if(drink==="no-coffee") return CAREERS["no-coffee"];
  const m=milk||""; const f=flavour||"";
  const milkKey=m?`${drink}__${m}`:drink;
  const careerKey=DRINK_MILK_MAP[milkKey]||DRINK_MILK_MAP[drink]||drink;
  const adj=FLAVOUR_ADJ[f];
  const finalKey=adj?.[careerKey]||careerKey;
  const career=CAREERS[finalKey]||CAREERS[drink]||CAREERS["flat-white"];
  return {...career, label:buildLabel(drink,m,f)};
}

function getActiveSteps(drink){
  if(!drink) return STEPS;
  if(drink==="no-coffee") return STEPS.filter(s=>s.id==="drink"||s.id==="ordering"||s.id==="pattern");
  return STEPS;
}

function readParams(){
  const p=new URLSearchParams(window.location.search);
  const drink=p.get("drink")||"";
  if(!drink) return null;
  return {drink,milk:p.get("milk")||"",flavour:p.get("flavour")||"",ordering:p.get("ordering")||"",pattern:p.get("pattern")||""};
}

// ─── SMALL COMPONENTS ─────────────────────────────────────────────────────────
function TBar(){return <div style={{background:C.bar,padding:"12px 20px",textAlign:"center"}}><div style={{color:C.gold,fontSize:12,letterSpacing:"0.14em",textTransform:"uppercase",fontFamily:F}}>☕ Melbourne Coffee × Cyber Career Quiz</div><div style={{color:C.softGold,fontSize:11,fontStyle:"italic",fontFamily:F,marginTop:3}}>Pour Decisions</div></div>;}
function Dv(){return <div style={{height:1,background:"#F0E6DA",margin:"16px 0"}}/>;}
function Lbl({children}){return <div style={{fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:C.muted,marginBottom:7,fontFamily:F}}>{children}</div>;}
function Bd({children,style={}}){return <div style={{fontSize:14,color:C.body,lineHeight:1.75,fontFamily:F,...style}}>{children}</div>;}
function Acc({title,children}){
  const[o,sO]=useState(false);
  return <div style={{border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden",marginBottom:10}}>
    <button onClick={()=>sO(x=>!x)} style={{width:"100%",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",background:o?C.pale:C.white,border:"none",fontFamily:F,textAlign:"left",cursor:"pointer"}}>
      <span style={{fontSize:12,letterSpacing:"0.1em",textTransform:"uppercase",color:C.accent}}>{title}</span>
      <span style={{color:C.accent,fontSize:18,lineHeight:1}}>{o?"−":"+"}</span>
    </button>
    {o&&<div style={{padding:"14px 16px",background:C.white,borderTop:`1px solid ${C.border}`}}>{children}</div>}
  </div>;
}
function Opt({label,selected,onClick}){
  const[h,sH]=useState(false);
  return <button onClick={onClick} onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)} style={{display:"block",width:"100%",padding:"12px 16px",marginBottom:8,fontFamily:F,fontSize:15,textAlign:"left",borderRadius:8,border:selected?`2px solid ${C.accent}`:`1px solid ${C.border}`,background:selected?C.pale:h?"#FBF6F0":C.white,color:selected?"#5C3A1E":C.text,cursor:"pointer"}}>{label}</button>;
}

// ─── DRINK STEP ───────────────────────────────────────────────────────────────
function DrinkStep({value,onChange}){
  const isI=value&&ICED.find(d=>d.val===value);
  const[tab,setTab]=useState(isI?"iced":"hot");
  function switchTab(t){
    setTab(t);
    const hotNow=HOT.some(d=>d.val===value);
    const icedNow=ICED.some(d=>d.val===value);
    if(t==="hot"&&icedNow) onChange("");
    if(t==="iced"&&hotNow) onChange("");
  }
  const drinks=tab==="hot"?HOT:ICED;
  return <>
    <div style={{display:"flex",marginBottom:18,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden",width:"fit-content"}}>
      {[["hot","Hot"],["iced","Iced"]].map(([t,l])=><button key={t} onClick={()=>switchTab(t)} style={{padding:"8px 22px",border:"none",fontFamily:F,fontSize:13,background:tab===t?C.bar:"transparent",color:tab===t?"#F0E6DA":C.sub}}>{l}</button>)}
    </div>
    {drinks.map(d=><Opt key={d.val} label={d.label} selected={value===d.val} onClick={()=>onChange(d.val)}/>)}
    <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
      <Opt label="I don't drink coffee or tea" selected={value==="no-coffee"} onClick={()=>onChange("no-coffee")}/>
    </div>
  </>;
}

// ─── RESULT SCREEN ────────────────────────────────────────────────────────────
function ResultScreen({answers,onRestart}){
  const[copied,setCopied]=useState(false);
  const[reaction,setReaction]=useState(null);
  const dc=resolveCareer(answers.drink,answers.milk,answers.flavour);
  const noCoffee=answers.drink==="no-coffee";
  const milkMod=noCoffee?"":(MILK[answers.milk]?.mod||"");
  const flavourMod=noCoffee?"":(FLAVOUR[answers.flavour]?.mod||"");
  const ordMod=ORD_MOD[answers.ordering]||"";
  const patMod=PAT_MOD[answers.pattern]||"";
  const whatSays=[milkMod,flavourMod].filter(Boolean).join(" ");
  const pers=[ordMod,patMod].filter(Boolean).join(" ");
  const dcol=DEMAND_COLOURS[dc.demand]||{bg:"#F3F4F6",tx:"#374151"};

  function buildURL(){
    const p=new URLSearchParams({drink:answers.drink||"",milk:answers.milk||"",flavour:answers.flavour||"",ordering:answers.ordering||"",pattern:answers.pattern||""});
    return `${SITE_URL}?${p.toString()}`;
  }
  function handleCopy(){
    const url=buildURL();
    const txt=`☕ I got ${dc.career} on the Melbourne Coffee × Cyber Career Quiz!\n\n"${dc.tagline}"\n\nDid it get you right?\n${url}`;
    navigator.clipboard?.writeText(txt).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2800);});
  }

  const li=items=>items.map((o,i)=><div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:6}}><span style={{color:C.accent,flexShrink:0,fontFamily:F,fontSize:13,lineHeight:"1.75"}}>—</span><Bd>{o}</Bd></div>);

  return <div style={{background:C.bg,minHeight:"100vh"}}>
    <TBar/>
    <div style={{maxWidth:520,margin:"0 auto",padding:"32px 20px 60px"}}>
      <div className="fu">
        <div style={{marginBottom:20}}><span style={{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:C.accent,background:C.pale,padding:"4px 10px",borderRadius:20,fontFamily:F,display:"inline-block"}}>Your result</span></div>
        <div style={{border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",marginBottom:16}}>
          <div style={{background:C.bar,padding:"26px 22px 20px"}}>
            <div style={{fontSize:32,marginBottom:8,lineHeight:1}}>☕</div>
            <div style={{fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",color:C.gold,marginBottom:5,fontFamily:F}}>{dc.label}</div>
            <div style={{fontSize:25,color:"#FFF8F0",lineHeight:1.2,marginBottom:9,fontFamily:F}}>{dc.career}</div>
            <div style={{fontSize:14,color:"#A07850",fontStyle:"italic",fontFamily:F,lineHeight:1.5}}>"{dc.tagline}"</div>
          </div>
          <div style={{background:C.white,padding:"20px 22px"}}>
            <Lbl>About this career</Lbl><Bd>{dc.desc}</Bd>
            {whatSays&&<><Dv/><Lbl>What your order says about you</Lbl><Bd>{whatSays}</Bd></>}
            {pers&&<><Dv/><Lbl>Café personality read</Lbl><Bd>{pers}</Bd></>}
            <Dv/>
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:8}}>
              <Lbl>Demand forecast</Lbl>
              <span style={{fontSize:12,padding:"3px 10px",borderRadius:20,fontFamily:F,background:dcol.bg,color:dcol.tx,marginTop:-4,display:"inline-block"}}>{dc.demand}</span>
            </div>
            <Bd>{dc.demandNote}</Bd>
            <Dv/>
            <Acc title="Typical organisations"><div>{li(dc.orgs)}</div></Acc>
            <Acc title="Qualifications & credentials"><div>{li(dc.quals)}</div></Acc>
            <Dv/>
            <div style={{background:"#FAF7F2",border:`1px solid ${C.border}`,borderRadius:10,padding:"16px",marginBottom:14}}>
              <div style={{fontSize:14,color:C.text,fontFamily:F,marginBottom:12,textAlign:"center"}}>☕ Did we get you right?</div>
              <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                {[{val:"yes",label:"👍 That's me",ab:"#DCFCE7",at:"#166534"},{val:"no",label:"👎 Not quite",ab:"#FEE2E2",at:"#991B1B"}].map(btn=>(
                  <button key={btn.val} onClick={()=>setReaction(btn.val)} style={{padding:"10px 20px",borderRadius:8,fontFamily:F,fontSize:14,border:`1px solid ${reaction===btn.val?btn.at:C.border}`,background:reaction===btn.val?btn.ab:C.white,color:reaction===btn.val?btn.at:C.sub,flex:1,maxWidth:160,cursor:"pointer"}}>{btn.label}</button>
                ))}
              </div>
              {reaction&&<div style={{textAlign:"center",marginTop:12,fontSize:13,color:C.muted,fontStyle:"italic",fontFamily:F}}>{reaction==="yes"?"Your coffee order knows you better than you thought. Share it.":"Try again with a different order — there are over 30 careers in here."}</div>}
            </div>
            <button onClick={handleCopy} style={{width:"100%",padding:"12px",border:`1px solid ${copied?"#166534":C.accent}`,borderRadius:8,background:copied?"#DCFCE7":C.pale,color:copied?"#166534":C.accent,fontSize:14,fontFamily:F,marginBottom:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {copied?<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>}
              {copied?"Link copied — paste it anywhere":"Copy link to share ↗"}
            </button>
            <div style={{background:"#FBF6F0",border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px"}}>
              <Bd style={{fontSize:12,color:C.muted,fontStyle:"italic"}}>This quiz is for fun only — not career advice. Cyber career paths are varied and no single coffee order defines your future. Qualifications listed are general guidance based on common Australian industry pathways — always verify current requirements with employers and registered training organisations.</Bd>
            </div>
          </div>
        </div>
        <button onClick={onRestart} style={{width:"100%",padding:13,border:`1px solid ${C.border}`,borderRadius:8,background:"transparent",color:C.sub,fontSize:14,fontFamily:F,marginBottom:12,cursor:"pointer"}}>What if I'd ordered something else?</button>
        <div style={{textAlign:"center",fontSize:11,color:C.muted,letterSpacing:"0.06em",fontFamily:F}}>Over 30 career matches · All Melbourne, always · Not career advice, just very good coffee</div>
      </div>
    </div>
  </div>;
}

// ─── QUIZ SCREEN ──────────────────────────────────────────────────────────────
function QuizScreen({step,stepIdx,totalSteps,currentVal,pct,onPick,onNext,onBack,drinkVal}){
  return <div style={{background:C.bg,minHeight:"100vh"}}>
    <TBar/>
    <div style={{maxWidth:520,margin:"0 auto",padding:"32px 20px 60px"}}>
      <div style={{marginBottom:20}}>
        <div style={{height:2,background:"#E5DDD4",borderRadius:2}}>
          <div style={{height:"100%",width:`${pct}%`,background:C.accent,borderRadius:2,transition:"width 0.4s"}}/>
        </div>
      </div>
      <span style={{fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:C.accent,background:C.pale,padding:"4px 10px",borderRadius:20,fontFamily:F,display:"inline-block",marginBottom:14}}>{step.layer}</span>
      <h2 style={{display:"block",fontSize:"clamp(18px,4vw,22px)",fontWeight:"normal",color:C.text,lineHeight:1.35,marginBottom:22,fontFamily:F}}>{step.question}</h2>
      {step.id==="drink"
        ?<DrinkStep value={drinkVal} onChange={onPick}/>
        :step.opts?.map(o=><Opt key={o.val} label={o.label} selected={currentVal===o.val} onClick={()=>onPick(o.val)}/>)
      }
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:16}}>
        <button onClick={onBack} style={{padding:"10px 20px",border:`1px solid ${C.border}`,borderRadius:8,background:"transparent",color:C.sub,fontSize:14,fontFamily:F}}>Back</button>
        <span style={{fontSize:12,color:C.muted,fontFamily:F}}>{stepIdx+1} of {totalSteps}</span>
        <button onClick={onNext} disabled={!currentVal} style={{padding:"10px 24px",border:"none",borderRadius:8,fontFamily:F,background:currentVal?C.bar:"#D5C5B5",color:currentVal?"#F0E6DA":C.muted,fontSize:14,cursor:currentVal?"pointer":"not-allowed"}}>{stepIdx===totalSteps-1?"See my result →":"Next →"}</button>
      </div>
    </div>
  </div>;
}

// ─── INTRO SCREEN ─────────────────────────────────────────────────────────────
function IntroScreen({onStart}){
  return <div style={{background:C.bg,minHeight:"100vh",fontFamily:F}}>
    <TBar/>
    <div style={{maxWidth:520,margin:"0 auto",padding:"clamp(28px,5vw,52px) 20px 60px",textAlign:"center"}}>
      <div style={{fontSize:52,marginBottom:16,lineHeight:1}}>☕</div>
      <div style={{fontSize:11,letterSpacing:"0.16em",textTransform:"uppercase",color:C.accent,marginBottom:14}}>A Melbourne café experience</div>
      <h1 style={{fontSize:"clamp(20px,4vw,26px)",fontWeight:"normal",color:C.text,lineHeight:1.2,marginBottom:6}}>Melbourne Coffee × Cyber Career Quiz</h1>
      <p style={{fontSize:15,color:C.sub,fontStyle:"italic",lineHeight:1.4,marginBottom:16}}>Pour Decisions</p>
      <p style={{fontSize:14,color:C.sub,lineHeight:1.75,maxWidth:400,margin:"0 auto 10px"}}>Your coffee order says more about your professional DNA than your LinkedIn profile does. We have mapped over 30 cyber careers to what you order — and how you order it.</p>
      <p style={{fontSize:13,color:C.muted,marginBottom:8,fontStyle:"italic"}}>Five questions. Four layers. Did we get you right?</p>
      <p style={{fontSize:12,color:C.muted,marginBottom:32,fontStyle:"italic"}}>From long blacks in Fitzroy to nitro cold brews in Collingwood.</p>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginBottom:36}}>
        {["The drink","The milk","The flavouring","Café personality"].map(l=><span key={l} style={{fontSize:12,padding:"5px 13px",borderRadius:20,border:`1px solid ${C.border}`,color:C.sub,background:C.white,fontFamily:F}}>{l}</span>)}
      </div>
      <button onClick={onStart} style={{padding:"14px 44px",background:C.bar,color:"#F0E6DA",border:"none",borderRadius:8,fontSize:16,fontFamily:F,cursor:"pointer"}}>Start the quiz</button>
      <div style={{marginTop:18,fontSize:12,color:C.muted,fontStyle:"italic"}}>For fun only — not career advice</div>
    </div>
  </div>;
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const shared=readParams();
  const[screen,setScreen]=useState(shared?"result":"intro");
  const[stepIdx,setStepIdx]=useState(0);
  const[answers,setAnswers]=useState(shared||{});

  const activeSteps=getActiveSteps(answers.drink||"");
  const step=activeSteps[stepIdx];
  const currentVal=step?.id==="drink"?answers.drink:(step?.field?answers[step.field]:undefined);
  const pct=(stepIdx/activeSteps.length)*100;

  function pick(val){
    if(step.id==="drink") setAnswers(a=>({...a,drink:val}));
    else if(step.field) setAnswers(a=>({...a,[step.field]:val}));
  }
  function next(){
    if(!currentVal) return;
    if(stepIdx<activeSteps.length-1) setStepIdx(i=>i+1);
    else setScreen("result");
  }
  function back(){
    if(stepIdx===0) setScreen("intro");
    else setStepIdx(i=>i-1);
  }
  function restart(){
    window.history.replaceState({},"",window.location.pathname);
    setAnswers({});setStepIdx(0);setScreen("intro");
  }

  if(screen==="intro") return <IntroScreen onStart={()=>setScreen("quiz")}/>;
  if(screen==="result") return <ResultScreen answers={answers} onRestart={restart}/>;
  return <QuizScreen step={step} stepIdx={stepIdx} totalSteps={activeSteps.length} currentVal={currentVal} pct={pct} onPick={pick} onNext={next} onBack={back} drinkVal={answers.drink}/>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body></html>
